event_calendar:
  recurring_events:
    fomc:
      description: "Federal Open Market Committee meeting"
      frequency: "8x per year"
      restricted_window_days_before: 1
      restricted_window_days_after: 0
      risk_adjustment: 0.70      # reduce enhancer/tactical to 70% on FOMC day

    cpi:
      description: "Consumer Price Index release"
      frequency: monthly
      restricted_window_days_before: 0
      restricted_window_days_after: 0
      risk_adjustment: 0.80

    nfp:
      description: "Non-Farm Payrolls (first Friday of each month)"
      frequency: monthly
      restricted_window_days_before: 0
      restricted_window_days_after: 0
      risk_adjustment: 0.80

    pce:
      description: "Personal Consumption Expenditures"
      frequency: monthly
      risk_adjustment: 0.85

    gdp:
      description: "GDP advance/preliminary/final release"
      frequency: quarterly
      risk_adjustment: 0.85

    earnings_season:
      description: "General earnings season window (Q1/Q2/Q3/Q4)"
      # Per-symbol earnings handled separately via data provider

  symbol_specific_rules:
    earnings:
      window_days_before: 1     # reduce tactical signal 1 day before earnings
      window_days_after: 0      # normal after earnings
      signal_multiplier: 0.50   # half-weight tactical signals in window

  custom_events: []
  # Add one-off events here, e.g.:
  # - date: "2025-01-20"
  #   name: "Presidential inauguration"
  #   risk_adjustment: 0.85
  #   affected_symbols: []      # empty = all symbols

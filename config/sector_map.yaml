  AMZN:  {sector: consumer_discretionary, industry: internet_retail}
  BKNG:  {sector: consumer_discretionary, industry: hotels_travel}
  CMG:   {sector: consumer_discretionary, industry: restaurants}
  TJX:   {sector: consumer_discretionary, industry: apparel_retail}

  # Consumer staples
  WMT:   {sector: consumer_staples,     industry: retail_consumer_staples}
  COST:  {sector: consumer_staples,     industry: retail_consumer_staples}
  GIS:   {sector: consumer_staples,     industry: packaged_food}
  DG:    {sector: consumer_staples,     industry: retail_consumer_staples}
  CLX:   {sector: consumer_staples,     industry: household_products}
  TSN:   {sector: consumer_staples,     industry: packaged_food}

  # Health care
  JNJ:   {sector: health_care,          industry: pharmaceuticals}
  LLY:   {sector: health_care,          industry: pharmaceuticals}
  GILD:  {sector: health_care,          industry: biotechnology}
  ABT:   {sector: health_care,          industry: medical_devices}
  TMO:   {sector: health_care,          industry: life_sciences_tools}
  A:     {sector: health_care,          industry: life_sciences_tools}
  ISRG:  {sector: health_care,          industry: medical_devices}
  MCK:   {sector: health_care,          industry: healthcare_distributors}
  UNH:   {sector: health_care,          industry: managed_care}

  # Financials
  GS:    {sector: financials,           industry: investment_banking}
  MS:    {sector: financials,           industry: investment_banking}
  C:     {sector: financials,           industry: diversified_banks}
  BRK-B: {sector: financials,           industry: multi_line_insurance}
  AXP:   {sector: financials,           industry: consumer_finance}
  CME:   {sector: financials,           industry: financial_exchanges}
  ACGL:  {sector: financials,           industry: property_casualty_insurance}

  # Energy
  COP:   {sector: energy,               industry: oil_gas_exploration}
  OXY:   {sector: energy,               industry: oil_gas_exploration}
  TRGP:  {sector: energy,               industry: oil_gas_midstream}

  # Materials
  APD:   {sector: materials,            industry: industrial_gases}

  # Utilities
  NEE:   {sector: utilities,            industry: electric_utilities}
  WEC:   {sector: utilities,            industry: electric_utilities}
  ED:    {sector: utilities,            industry: electric_utilities}

  # Real estate
  VICI:  {sector: real_estate,          industry: gaming_reit}

# Known historical reclassifications (effective_date applies forward).
# As of `effective_date` the sector flips from `from_sector` to
# `to_sector`. Pre-effective_date, sector_resolver returns the original
# `from_sector`.
historical_reclassifications:
  - {symbol: TSLA,  from_sector: consumer_discretionary, to_sector: consumer_discretionary,
     from_industry: automobiles, to_industry: automobiles,
     effective_date: 2020-12-21,
     note: "GICS classification unchanged; included as PIT pattern reference"}
  # META was renamed from Facebook but stayed Communication Services through
  # 2018 reclass (when GICS moved internet platforms from Tech →
  # Communication Services on 2018-09-28).
  - {symbol: META,  from_sector: technology,             to_sector: communication,
     from_industry: software_systems, to_industry: interactive_media,
     effective_date: 2018-09-28,
     note: "GICS 2018-09-28 communication services creation"}
  - {symbol: GOOGL, from_sector: technology,             to_sector: communication,
     from_industry: software_systems, to_industry: interactive_media,
     effective_date: 2018-09-28}

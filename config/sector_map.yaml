# GICS sector / industry classification for PQS universe.
# PRD 2026-05-12 (Bucket C). Manual curate; PIT-aware via
# `historical_reclassifications` for known shifts (TSLA 2020-12-21 etc).
#
# Source: GICS public classification (S&P / MSCI), cross-checked
# 2026-05-12. ETFs / leveraged products tagged sector=etf to ease
# downstream sector-relative computation (excluded from sector
# medians / breadth).

sector_map:
  # ETFs and leveraged products
  SPY:   {sector: etf,                  industry: broad_market_etf}
  QQQ:   {sector: etf,                  industry: nasdaq_100_etf}
  GLD:   {sector: etf,                  industry: gold_commodity_etf}
  TQQQ:  {sector: etf,                  industry: leveraged_nasdaq_etf}
  SOXL:  {sector: etf,                  industry: leveraged_semis_etf}

  # Technology (mega-cap + semis + software)
  AAPL:  {sector: technology,           industry: consumer_electronics}
  MSFT:  {sector: technology,           industry: software_systems}
  NVDA:  {sector: technology,           industry: semiconductors}
  AVGO:  {sector: technology,           industry: semiconductors}
  TXN:   {sector: technology,           industry: semiconductors}
  MU:    {sector: technology,           industry: semiconductors_memory}
  LRCX:  {sector: technology,           industry: semiconductor_equipment}
  KLAC:  {sector: technology,           industry: semiconductor_equipment}
  TER:   {sector: technology,           industry: semiconductor_equipment}
  EA:    {sector: communication,        industry: video_games}
  GOOGL: {sector: communication,        industry: interactive_media}
  META:  {sector: communication,        industry: interactive_media}
  VZ:    {sector: communication,        industry: telecom_services}
  TKO:   {sector: communication,        industry: media_entertainment}

  # Consumer discretionary

env: local
project_name: pqs
version: "0.1.0"

paths:
  data_dir: data
  reports_dir: reports
  config_dir: config
  db_path: data/trading.db

logging:
  level: INFO
  log_to_file: true
  log_file_name: pqs.log
  max_bytes: 10485760   # 10 MB
  backup_count: 5

# PRD M3/M13: runtime alignment check behavior.
# mode: warn (default) | fail
#   warn → log mismatch but allow all entrypoints to run
#   fail → block live paper on mismatch; backtest/research continue
#          unless live_only_fail is false
# live_only_fail: when true, fail mode ONLY blocks live paper, not
#   backtest/research. Recommended default for safety.
#
# Phase 1 (current, 2026-04-21): mode=warn. After 2-week observation
# of warn-mode artifacts at data/paper_trading/alignment_*.json,
# flip to mode=fail without breaking research paths.
alignment:
  mode: warn
  live_only_fail: true

account:
  initial_capital_usd: 100000.0   # raised from 10_000 (2026-04-20):
                                   # $10k + integer_shares + $700 SPY =
                                   # ~14 shares per rebalance, 1 symbol
                                   # ends up 100% of portfolio. Integer
                                   # rounding noise dominates mining
                                   # metrics. $100k gives realistic
                                   # position sizes across the universe
                                   # and actually exposes rebalancing +
                                   # concentration + cost issues.
  currency: USD
  timezone: America/New_York

env: local
project_name: pqs
version: "0.1.0"

paths:
  data_dir: data
  reports_dir: reports
  config_dir: config
  db_path: data/trading.db

logging:
  level: INFO
  log_to_file: true
  log_file_name: pqs.log
  max_bytes: 10485760   # 10 MB
  backup_count: 5

account:
  initial_capital_usd: 100000.0   # raised from 10_000 (2026-04-20):
                                   # $10k + integer_shares + $700 SPY =
                                   # ~14 shares per rebalance, 1 symbol
                                   # ends up 100% of portfolio. Integer
                                   # rounding noise dominates mining
                                   # metrics. $100k gives realistic
                                   # position sizes across the universe
                                   # and actually exposes rebalancing +
                                   # concentration + cost issues.
  currency: USD
  timezone: America/New_York

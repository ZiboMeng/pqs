spy_ema_fast: 50
spy_ema_slow: 200
vix_symbol: "^VIX"
tnx_symbol: "^TNX"
tnx_spike_threshold: 0.15   # 10Y yield daily rise >= 15bp → forces minimum CAUTIOUS
smoothing_window: 3          # avoid flip-flopping; regime confirmed after N consecutive bars

vix_thresholds:
  bull:     15.0
  risk_on:  20.0
  neutral:  25.0
  cautious: 30.0
  risk_off: 35.0
  crisis:   45.0

drawdown_thresholds:
  cautious: -0.05   # SPY drawdown from 52w high >= 5%  → minimum CAUTIOUS
  risk_off: -0.10   # >= 10% → minimum RISK_OFF
  crisis:   -0.20   # >= 20% → CRISIS

# Position constraints per regime
# target_cash_pct_min / max: target cash allocation range
# max_single_position: overrides risk.yaml caps for this regime
# leveraged_etf_allowed: whether TQQQ/SOXL can be held
# left_side_trading_allowed: whether left-side module can activate

position_constraints:
  BULL:
    target_cash_pct_min: 0.00
    target_cash_pct_max: 0.10
    max_single_position: 0.35
    leveraged_etf_allowed: true
    left_side_trading_allowed: false
    left_side_max_single: 0.0

  RISK_ON:
    target_cash_pct_min: 0.05
    target_cash_pct_max: 0.15
    max_single_position: 0.30
    leveraged_etf_allowed: true
    left_side_trading_allowed: false
    left_side_max_single: 0.0

  NEUTRAL:
    target_cash_pct_min: 0.15
    target_cash_pct_max: 0.30
    max_single_position: 0.25
    leveraged_etf_allowed: false
    left_side_trading_allowed: false
    left_side_max_single: 0.0

  CAUTIOUS:
    target_cash_pct_min: 0.30
    target_cash_pct_max: 0.50
    max_single_position: 0.20
    leveraged_etf_allowed: false
    left_side_trading_allowed: false
    left_side_max_single: 0.0

  RISK_OFF:
    target_cash_pct_min: 0.50
    target_cash_pct_max: 0.80
    max_single_position: 0.15
    leveraged_etf_allowed: false
    left_side_trading_allowed: true
    left_side_max_single: 0.05

  CRISIS:
    target_cash_pct_min: 0.80
    target_cash_pct_max: 1.00
    max_single_position: 0.10
    leveraged_etf_allowed: false
    left_side_trading_allowed: false
    left_side_max_single: 0.0

# Hard constraints — these must NEVER be changed
long_only: true
allow_margin: false
allow_short: false
max_gross_exposure: 1.0

drawdown_limits:
  warning_pct: 0.10      # portfolio drawdown 10% → WARNING
  reduce_pct: 0.15       # → REDUCE (force 50% cash)
  defensive_pct: 0.20    # → DEFENSIVE (SPY + cash only)
  halt_pct: 0.25         # → HALT (no new trades, human review required)
  max_drawdown_vs_benchmark_multiplier: 1.5
  single_crisis_drawdown_cap: 0.25

position_limits:
  max_single_position: 0.35
  max_positions: 10
  min_position_size_usd: 500.0
  allow_fractional_shares: false
  symbol_caps:
    SPY:   0.35
    QQQ:   0.30
    GLD:   0.20
    AAPL:  0.15
    MSFT:  0.15
    GOOGL: 0.12
    AMZN:  0.12
    META:  0.12
    NVDA:  0.12
    TSLA:  0.10
    TQQQ:  0.10
    SOXL:  0.10

budget:
  core:     0.58   # SPY, QQQ, GLD
  tactical: 0.27   # Mag7
  enhancer: 0.10   # TQQQ, SOXL (only in RISK_ON / BULL)
  # cash = 1 - (0.58 + 0.27 + 0.10) = 0.05 minimum

left_side_trading:
  enabled: false
  allowed_regimes: [RISK_OFF]
  min_drawdown_from_peak: -0.15
  min_factor_consensus: 3
  max_vix: 40.0
  no_active_kill_switch: true
  max_single_position: 0.05
  build_in_tranches: 3
  tranche_interval_days: 3
  time_stop_days: 15
  loss_stop_pct: -0.08
  profit_target_pct: 0.15
  auto_disable_on_consecutive_loss: 3

# Multi-TF timing layer thresholds (约束 3 / P1 闭环).
# Controls core/intraday/multi_timescale.py::decide_timing. Tuning lets
# us evaluate timing aggressiveness without code changes.
intraday_timing:
  min_timing_scale: 0.0        # hard-veto floor (scales below → execute=False)
  execute_threshold: 0.15      # bar-level defer threshold
  scale_when_60m_contradict: 0.5
  scale_when_60m_neutral: 0.8
  mult_30m_contradict: 0.5
  mult_30m_neutral: 0.8

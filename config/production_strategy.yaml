# config/production_strategy.yaml — SINGLE SOURCE OF TRUTH
#
# PRD: docs/20260421-prd_framework_completion.md §M1
#
# This file is the ONE authoritative definition of the current production
# strategy. `run_backtest.py`, `run_paper.py`, `run_multi_tf_backtest.py`,
# `scripts/generate_report.py` all read from here. Hardcoded `factor_weights`
# in those scripts was removed 2026-04-21.
#
# Lifecycle states (status field):
#   active               - promoted from mining archive via M2 promote CLI;
#                          all validation fields true; source.spec_id filled
#   conservative_default - no post-fix validated best yet; using best-known
#                          manual calibration; allowed for backtest/research
#                          but M3 alignment check will WARN in paper live
#   no_validated_best    - stronger: system explicitly refuses to run
#                          backtest baseline or live paper on this strategy
#                          (require --strategy X or --override-production)
#
# To promote a new strategy: use `scripts/promote_strategy.py --spec-id <hash>
# --promote` (M2). Do NOT hand-edit status to active.

schema_version: "1.0"

# ---------------------------------------------------------------------------
# Current state: conservative_default
# Reason: CLAUDE.md notes pre-P0.1-fix `apply_extra_shift=True` era weights
# are not reproducible on current codebase. R29-R35 mining yielded no trial
# passing OOS IR >= 0.20 threshold on expanded (R28) universe. Until M2 runs
# an acceptance pack against a post-fix validated spec_id, we use the R33
# grid-best weights (in-sample beats QQQ +3.13pt) as the honest best-known
# conservative default.
# ---------------------------------------------------------------------------
status: "conservative_default"

strategy_type: "multi_factor"

# Source tracking — for conservative_default, mode=manual, other fields empty.
# For active status, all fields must be filled by promote_strategy.py.
source:
  mode: "manual"                  # manual | promoted_from_archive
  spec_id: ""
  lineage_tag: ""
  promoted_at: ""
  rationale: |
    R33 grid-best weights (pre-P0.1-fix calibration on R28 expanded universe).
    Grid searched 156 weight configurations; this config: CAGR 20.75% vs
    QQQ 17.62% (+3.13pt), Beat-QQQ: 51/156. Post-P0.1-fix validation pending
    (see validation.post_fix_validated).

# Strategy parameters — must match MultiFactorStrategy.__init__ signature.
# Non-risk knobs go here; runtime safety knobs stay in config/risk.yaml.
params:
  top_n: 4
  rebalance_monthly: false
  score_weighted: true
  min_holding_days: 3
  lookback_mom: 189
  lookback_quality: 189
  lookback_vol: 84
  apply_extra_shift: false        # P0.1 fix: T-1 close → T+1 open (NOT T-2)

# factor_weights sums to 1.0 +- 1e-6; names MUST be in PRODUCTION_FACTORS.
# Current 7: low_vol / momentum / quality / pv_div / rel_strength /
# market_trend / drawup_from_252d_low (R15 user-auth promoted).
factor_weights:
  low_vol: 0.15
  momentum: 0.05
  quality: 0.30
  pv_div: 0.05
  rel_strength: 0.30
  market_trend: 0.0
  drawup_from_252d_low: 0.15

# Validation status — filled by M2 promote_strategy.py after acceptance pack.
# For conservative_default, all false is expected and legal.
validation:
  post_fix_validated: false       # post-P0.1-fix revalidated
  passed_oos_gate: false          # OOS IR >= 0.20 in walk-forward
  passed_qqq_gate: false          # CAGR > QQQ on full + holdout + OOS avg
  passed_paper_backtest_alignment: false
  notes: |
    R33 weights pre-date apply_extra_shift=False default. Current post-fix
    codebase may not reproduce pre-fix OOS numbers. Pending post-fix
    re-mining + acceptance pack before promote to active.

# Fingerprints — filled at promote time, used by M3 runtime alignment check.
# Empty for conservative_default; M3 will log provisional status on startup.
fingerprints:
  universe_hash: ""
  factor_registry_hash: ""
  config_hash: ""

# ---------------------------------------------------------------------------
# PRD-X v2 (2026-05-20) — decision-stack overlay configuration
# ---------------------------------------------------------------------------
# This section is PRD-X-specific and OPT-IN. Default `mode: off` keeps the
# legacy MultiFactorStrategy → PortfolioConstructor → BacktestEngine path
# byte-identical (M11a/M11b parity preserved). Setting `mode: trigger-first`
# requires explicit `--decision-stack trigger-first` CLI flag on run_backtest
# OR an `active`-status promotion via promote_strategy.py M2 path.
#
# Status flip rules (mirror existing `status:` discipline above):
#   - mode: off → legacy bit-identical (default)
#   - mode: trigger-first → opt-in via CLI flag, no silent activation
#   - production status: still "conservative_default" — flipping to "active"
#     remains a directional decision requiring user explicit-go +
#     M2 promote_strategy.py acceptance pack on the decision-stack
#     path numbers (not just legacy MultiFactor numbers)
#
# Auditor F6 closure (R14 → P2-2): config SoT now reflects architectural
# direction; status flip stays directional, not auto.
decision_stack:
  mode: "off"                        # off | trigger-first
  # PartialRebalancePolicy parameters (active when mode != off)
  partial_rebalance:
    band_base: 0.02                  # NoTradeBandCalculator base width
    partial_full_threshold: 0.05     # target ≤ threshold → ENTER_PARTIAL
  # MLSidecarPolicy parameters (§9.0 sign-vote / include-veto only;
  # never continuous magnitude as size weight — runtime ENFORCED)
  ml_sidecar:
    enabled: false                   # off → SignVote.NO_VOTE (pass-through)
    voter_kind: "no_op"              # no_op | weak_factor_filter | xgb_classifier
    voter_params: {}                 # voter-specific kwargs
  # RuleBasedDecisionPolicy parameters (factor-driven entry/exit detection;
  # ONLY used when upstream is not generating its own weight panel — e.g.
  # research drivers in dev/scripts/prdx/. Production path via run_backtest
  # uses the overlay-on-strategy pattern and skips RuleBased state machine.)
  rule_based:
    entry_threshold: 0.7
    exit_threshold: 0.3
    confirm_min_bars: 2
    base_position_size: 0.05
    ttl_bars: 3                      # bar-anchored (P1-3 fix; not days)
  # DeferredExecutionAdapter parameters (P1-1 real kernel-driver)
  deferred_execution:
    execution_delay_bars: 1          # T+1 fill (matches BacktestEngine default)
    enabled: false                   # currently audit-only; mode='off' bypass
# ---------------------------------------------------------------------------

# Inverse ETF position cap — to be determined by priority-5.2 grid search
# Grid points (sweep at construction time):
inverse_etf_cap_grid:
  candidate_caps_pct: [5.0, 7.5, 10.0, 12.5, 15.0]
  decision_metrics:
    - "full_period_sharpe"
    - "full_period_max_dd"
    - "2025_vs_spy_excess"
    - "2008_stress_max_dd"  # crisis behavior
    - "stress_slice_covid_flash_max_dd"
    - "stress_slice_rate_hike_2022_max_dd"
  decision_rule: |
    Pick cap maximizing Sharpe subject to MaxDD ≤ 20% AND
    2026-style stress MaxDD ≤ 25% (CLAUDE.md Black Swan Quantification).
    If multiple caps tie on Sharpe, prefer LOWER cap (conservative).

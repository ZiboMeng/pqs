# config/temporal_split.yaml — Track A v1 alternating-year regime-stratified split
#
# PRD: docs/prd/20260429-temporal_split_holdout_discipline_prd.md (v1.1)
# Roadmap: docs/memos/20260429-post_audit_strategic_roadmap.md (v3)
#
# This file is the SINGLE SOURCE OF TRUTH for temporal split structure,
# access rules, role-locked gates, acceptance criteria, and audit guards.
# Python code MUST read from here; no year, threshold, or role string
# may be hardcoded in any module under core/.
#
# Modification policy:
#   - locked_after_first_use: true means once any mining run consumes
#     this file, all future modifications must bump split_name (e.g.,
#     v1 → v2). Old archive trials remain readable but evaluator refuses
#     to mix v1 and v2 results in the same comparison.
#   - All audit.fail_closed_* guards abort runtime with a clear message;
#     they are NOT silently bypassable.
#
# Codex round 19 + 20 reviewed and approved at PRD level (2026-04-29).

schema_version: "1.0"
split_name: "alternating_regime_holdout_v1"
created_at: "2026-04-29"
locked_after_first_use: true

partition:
  # Crisis reference years — available for stress comparison but excluded
  # from alpha selection. These years pre-date the 64-symbol universe's
  # full coverage and contain regime structure (2008 GFC) that we do
  # not want to over-weight in factor selection.
  reference_years:
    - {range: [2007, 2008], purpose: "crisis_reference_only", excluded_from_alpha: true}

  # Training years: bulk historical training data + 2 even-year slots
  # (2020/2022/2024) that share recent market structure but are
  # bracketed by validation years on either side.
  train_years:
    - {range: [2009, 2017]}
    - {year: 2020}
    - {year: 2022}
    - {year: 2024}

  # Validation years: 5 years across distinct regime classes. M1 (Claude)
  # moved 2018 from train into validation to add bear-regime validation
  # coverage; without 2018, all 4 validation years would be long-bull
  # (2019/2021/2023/2025) and bear-regime alpha would be untested.
  #
  # auto_classifier_tag is null at PRD draft time; filled by Step A.8
  # (regime_detector integration). Disagreement policy is tiered (M9):
  # 0-1 year disagrees → memo only; ≥2 year disagree → user explicit-go
  # required before split_name lock.
  validation_years:
    - {year: 2018, manual_regime_tag: "rate_hike_bear",       auto_classifier_tag: null, weight: 1.0}
    - {year: 2019, manual_regime_tag: "normal_bull",          auto_classifier_tag: null, weight: 1.0}
    - {year: 2021, manual_regime_tag: "liquidity_mania",      auto_classifier_tag: null, weight: 1.0}
    - {year: 2023, manual_regime_tag: "ai_narrow",            auto_classifier_tag: null, weight: 1.0}
    - {year: 2025, manual_regime_tag: "current_market",       auto_classifier_tag: null, weight: 2.0}

  # Stress slices borrowed from train years — MaxDD sanity check ONLY,
  # do NOT participate in alpha selection or validation aggregation.
  # mode=stress_check_only is enforced by the loader.
  stress_slices:
    - name: "covid_flash"
      start: "2020-02-15"
      end: "2020-04-30"
      source_year: 2020
      mode: "stress_check_only"
      maxdd_threshold: 0.25
    - name: "rate_hike_2022"
      start: "2022-08-15"
      end: "2022-10-15"
      source_year: 2022
      mode: "stress_check_only"
      maxdd_threshold: 0.25

  # Sealed final test — single-shot evaluation. Codex R20 B1: any core
  # sealed eval consumes the holdout for this split_name. Subsequent
  # core sealed eval requires bumping split_name.
  sealed_test_years:
    - {year: 2026, mode: "single_shot_evaluation"}

# Access rules — what each pipeline stage may read. M3 factor warmup
# may cross train→validation boundary (rolling 252-day momentum reads
# 2018 data when generating 2019 signals — this is rolling factor
# semantics, not leakage); enforced cap at 504 days.
access_rules:
  miner_may_access: ["train"]
  selector_may_access: ["train", "validation"]
  factor_warmup_may_cross_boundary: true
  factor_warmup_max_lookback_days: 504
  validation_signal_dates_must_be_in: ["validation"]
  sealed_test_access: "final_only_single_shot"

# Role-locked gates (M2 + M6 + Claude C1-C5).
# C1: roles defined here pre-mining; immutable per split_name.
# C2: candidate role assigned BEFORE mining; no post-hoc reclassification.
# C3: each role-specific weakening must have a compensating constraint.
# C4: modifying any gate post-lock requires bumping split_name.
# C5 (codex R20 Q3): same candidate_spec_sha256 cannot be reminted under
#                    different role within same split_name.
roles:
  core:
    description: "First active/leading allocator; full gate"
    eligibility_constraint: []
    validation_gates:
      - {field: "validation.2025.excess_vs_qqq", op: ">",  value: 0.0,  action: "kill_candidate"}
      - {field: "validation.2025.maxdd",         op: "<=", value: 0.20, action: "kill_candidate"}
  diversifier:
    description: "Role-locked at mining start; not a fallback for failed core"
    eligibility_constraint:
      - {field: "vs_existing_core_correlation", op: "<", value: 0.40}
      - {field: "vs_existing_core_overlap",     op: "<", value: 0.30}
    validation_gates:
      - {field: "validation.2025.excess_vs_qqq", op: ">",  value: -0.05, action: "kill_candidate"}
      - {field: "validation.2025.maxdd",         op: "<=", value: 0.18,  action: "kill_candidate"}

# Acceptance criteria across validation years + stress slices + cost +
# concentration + beta + purge rules + dividend safety + F1/F2 fork
# criteria. All values read at runtime; no hardcoding in Python.
acceptance:
  validation_year_pass:
    excess_vs_spy_positive_min: 4
    excess_vs_qqq_positive_min: 3
    maxdd_per_year_max: 0.20
  stress_slice_pass:
    maxdd_per_slice_max: 0.25
  cost_robustness:
    multiplier_2x_must_remain_positive: true
  concentration:
    top1_max: 0.40
    top3_max: 0.70
    no_leveraged_etf_dependency: true
  beta:
    beta_to_qqq_max: 0.85

  # M4: purged label / forward-return boundary rules.
  purge_rules:
    label_horizon_days_max: 21
    purge_at_split_boundary: true
    embargo_days: 0

  # M8: dividend safety (Track D enforces; Track A only ships schema).
  dividend_safety:
    enforce_at: "track_d_promotion"
    required_excess_margin_5yr: 0.04
    fallback: "must_add_dividend_correction_before_promotion"
    rationale: |
      SPY historical dividend yield ~1.3%/yr, QQQ ~0.6%/yr. 5-year
      cumulative diff ~3.5-4%. If 5y excess vs QQQ < 4%, dividend
      omission could flip the QQQ outperformance gate. v1 provisional;
      Track D will derive final cutoff from actual SPY-vs-QQQ historical
      div diff at promotion time.

  # M7: F1/F2 fork criteria. Pre-smoke locked. Codex R20 Q1 added
  # max(0.10, ...) floor to F1 to prevent auto-lowering OOS IR threshold
  # below 0.10 without user explicit-go.
  fork_criteria:
    smoke_trial_count: 100
    smoke_universe: "current_64_research_factors_unchanged"
    smoke_split_yaml: "alternating_regime_holdout_v1"
    smoke_run_command: "scripts/run_mining.py --smoke --trials 100 --split alternating_regime_holdout_v1"
    rules:
      - condition: "F1_trigger"
        if_all:
          - {metric: "smoke.IR_p90",            op: ">",  value: 0.15}
          - {metric: "smoke.fraction_above_0.10", op: ">=", value: 0.20}
        then: "F1_gate_recalibration"
        new_oos_ir_threshold_formula: "max(0.10, smoke.IR_p75)"
        new_oos_ir_threshold_below_floor_action: "user_explicit_approval_required"
        explicit_rationale_required: true
      - condition: "F2_trigger"
        if_all:
          - {metric: "smoke.IR_p90", op: "<", value: 0.05}
          - {metric: "smoke.IR_p50", op: "<", value: -0.05}
        then: "F2_new_factor_family"
        explicit_rationale_required: true
      - condition: "escalate"
        if_else: true
        then: "escalate_to_user_explicit_decision"

# Audit guards — runtime fail-closed checks. None of these are silently
# bypassable; all must produce clear abort messages.
audit:
  config_sha256_recorded_in_archive: true
  panel_max_date_recorded_per_run: true
  fail_closed_if_2026_row_in_train_panel: true
  fail_closed_if_validation_year_in_train_panel: true
  fail_closed_if_role_unspecified_at_mining_start: true
  fail_closed_if_regime_tag_missing_either_source: true
  fail_closed_if_label_crosses_split_boundary: true
  fail_closed_if_factor_lookback_exceeds_cap: true
  record_actual_max_lookback_per_candidate: true

  # M5 sealed-eval ledger (codex R20 B1: split-level lock added to
  # candidate-level lock — any core sealed eval consumes the holdout
  # for that split_name; subsequent core sealed eval requires bumping
  # split_name).
  sealed_eval_ledger:
    enabled: true
    path: "data/research_candidates/sealed_eval_ledger.parquet"
    fields:
      - split_name
      - split_sha256
      - candidate_spec_sha256
      - role
      - git_sha
      - panel_max_date
      - evaluation_timestamp_utc
      - result_metrics_sha256
    fail_closed_on_repeat:
      key: ["split_name", "candidate_spec_sha256"]
      action: "abort_with_message"
    fail_closed_on_split_failure:
      role: "core"
      key: ["split_name", "role"]
      action: "abort_with_message"
      message: "Core sealed eval already performed under split X. To re-evaluate, bump split_name to a new version."

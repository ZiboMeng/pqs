# Unified research mask config — Phase E-post R5 (E-post-2).
#
# Single source of truth for the research-sample eligibility rules that
# determine whether a (date, symbol) bar is "usable" for research,
# acceptance, and paper-candidate evaluation. Before this file, each
# script repeated `{min_price=5.0, min_usd=20e6, window=20}` inline.
#
# Hard invariant (PRD §10.2): the values below MUST match the historical
# hardcoded defaults in `core/factors/base_masks.py::research_mask` so
# that the eligibility set on `post-2026-04-24-rcm-v1-lag1` lineage
# window is bit-for-bit identical before and after the refactor. Tests
# lock this in (`tests/unit/factors/test_research_mask_config.py`).
#
# To change thresholds for future research: update this file AND bump
# a new lineage_tag. Changing thresholds silently would invalidate
# cross-lineage comparisons (e.g. RCMv1 vs Candidate-2 paper drift).

research_mask:
  # Minimum close price (USD). Cells with close < min_price are masked
  # out. Matches admission extended tier (core tier uses 10.0, not
  # applicable here — research mask is extended tier only).
  min_price: 5.0

  # Minimum 20-day rolling dollar volume (USD). Cells failing this
  # threshold are considered illiquid for research purposes.
  min_usd: 20000000.0

  # Rolling window length (trading days) for the dollar-volume computation.
  window: 20

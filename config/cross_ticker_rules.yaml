# config/cross_ticker_rules.yaml (PRD M4) — declarative cross-ticker rule DSL
#
# Rules compose on top of strategy outputs (weight dict per bar) to express
# "when X, do Y" logic without writing a new strategy class.
#
# 3 rule types supported:
#   - benchmark_trigger   : condition on driver symbol gates target symbols
#   - regime_basket       : regime-conditioned basket preference
#   - multi_tf_confirmation: timing-layer multiplier for confirmed setups
#
# Invariants (enforced by core/signals/cross_ticker_rules.py):
#   - Long-only: rule action cannot produce negative effective weight
#   - Priority ordering determines conflict resolution (lower = earlier)
#   - Unknown rule types are REJECTED at load time (no silent drop)
#   - Expression parser is whitelist-only (NO Python eval)
#
# Usage:
#   from core.signals.cross_ticker_rules import load_rules, apply_rules
#   enabled, rules = load_rules("config/cross_ticker_rules.yaml")
#   if enabled:
#       adjusted_weights = apply_rules(weights, context, rules)

enabled: true

rules:
  # ─────────────────────────────────────────────────────────────────────────
  # Rule 1: SPY trend filter gates leveraged tech exposure
  # ─────────────────────────────────────────────────────────────────────────
  # Classic regime-robust gate. When SPY 50d MA is above 200d MA (golden
  # cross), allow overweighting leveraged / tech-tilted names. Below,
  # withhold that extra exposure (multiplier returns to 1.0 via absence
  # of trigger).
  - name: "spy_golden_cross_enables_tech_overweight"
    type: benchmark_trigger
    driver: SPY
    condition: "sma(close, 50) > sma(close, 200)"
    action: allow_overweight
    targets: [QQQ, TQQQ, SOXL, NVDA, AAPL, MSFT, META, GOOGL, AMZN, TSLA]
    weight_multiplier: 1.20
    regime_scope: [BULL, RISK_ON, NEUTRAL]
    priority: 10

  # ─────────────────────────────────────────────────────────────────────────
  # Rule 2: RISK_OFF / CRISIS → defensive blend
  # ─────────────────────────────────────────────────────────────────────────
  # In stressed regimes, blend 50/50 with a defensive basket of Treasuries +
  # gold + staples. override_strategy=false means the base strategy's
  # picks still get 50% weight; this is a risk dampener, not a full regime
  # override.
  - name: "defensive_blend_risk_off"
    type: regime_basket
    regime: [RISK_OFF, CRISIS]
    basket_weights:
      TLT: 0.25
      IEF: 0.15
      GLD: 0.25
      SHY: 0.15
      JNJ: 0.10
      PG:  0.10
    override_strategy: false
    priority: 20

  # ─────────────────────────────────────────────────────────────────────────
  # Rule 3: QQQ breakout requires sector ETF confirmation
  # ─────────────────────────────────────────────────────────────────────────
  # When QQQ closes above a 20-day high AND XLK (tech sector) shows
  # coincident 20-day MA strength, scale QQQ weight up. Fail-safe: missing
  # XLK data = no change.
  - name: "qqq_breakout_confirmed_by_xlk"
    type: multi_tf_confirmation
    target: QQQ
    primary_condition: "close > ref_high(20)"
    confirmations:
      - symbol: XLK
        timeframe: daily
        condition: "sma(close, 5) > sma(close, 20)"
    action:
      timing_scale_multiplier: 1.15
    priority: 30

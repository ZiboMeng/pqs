# config/cross_ticker_rules.yaml (PRD M4) — declarative cross-ticker rule DSL
#
# Rules compose on top of strategy outputs (weight dict per bar) to express
# "when X, do Y" logic without writing a new strategy class.
#
# 3 rule types supported:
#   - benchmark_trigger   : condition on driver symbol gates target symbols
#   - regime_basket       : regime-conditioned basket preference
#   - multi_tf_confirmation: timing-layer multiplier for confirmed setups
#
# Invariants (enforced by core/signals/cross_ticker_rules.py):
#   - Long-only: rule action cannot produce negative effective weight
#   - Priority ordering determines conflict resolution (lower = earlier)
#   - Unknown rule types are REJECTED at load time (no silent drop)
#   - Expression parser is whitelist-only (NO Python eval)
#
# Usage:
#   from core.signals.cross_ticker_rules import load_rules, apply_rules
#   enabled, rules = load_rules("config/cross_ticker_rules.yaml")
#   if enabled:
#       adjusted_weights = apply_rules(weights, context, rules)

enabled: true

rules:
  # ─────────────────────────────────────────────────────────────────────────
  # Rule 1: SPY trend filter gates leveraged tech exposure
  # ─────────────────────────────────────────────────────────────────────────
  # Classic regime-robust gate. When SPY 50d MA is above 200d MA (golden
  # cross), allow overweighting leveraged / tech-tilted names. Below,
  # withhold that extra exposure (multiplier returns to 1.0 via absence
  # of trigger).
  - name: "spy_golden_cross_enables_tech_overweight"
    type: benchmark_trigger
    driver: SPY
    condition: "sma(close, 50) > sma(close, 200)"
    action: allow_overweight
    targets: [QQQ, TQQQ, SOXL, NVDA, AAPL, MSFT, META, GOOGL, AMZN, TSLA]
    weight_multiplier: 1.20
    regime_scope: [BULL, RISK_ON, NEUTRAL]
    priority: 10

  # ─────────────────────────────────────────────────────────────────────────
  # Rule 2: RISK_OFF / CRISIS → defensive blend (with recovery fast-exit)
  # ─────────────────────────────────────────────────────────────────────────
  # In stressed regimes, blend 50/50 with a defensive basket of Treasuries +
  # gold + staples. override_strategy=false means the base strategy's
  # picks still get 50% weight; this is a risk dampener, not a full regime
  # override.
  #
  # suppress_if (deep-mining R25 stress test finding): V-recoveries (e.g.
  # 2020 COVID) were hurt because the defensive blend stayed active after
  # the market had already turned. The SPY 5d/20d SMA cross is sensitive
  # enough to catch the turn a few weeks earlier than close > 50d SMA,
  # without over-triggering on single-day noise. If user later sees whipsaw
  # issues, add a persistence gate (e.g. require 3 consecutive days).
  - name: "defensive_blend_risk_off"
    type: regime_basket
    regime: [RISK_OFF, CRISIS]
    basket_weights:
      TLT: 0.25
      IEF: 0.15
      GLD: 0.25
      SHY: 0.15
      JNJ: 0.10
      GIS: 0.10   # was PG (not in seed_pool); GIS is nearest staples analog in universe
    override_strategy: false
    suppress_if:
      driver: SPY
      condition: "sma(close, 5) > sma(close, 20)"
    priority: 20

  # ─────────────────────────────────────────────────────────────────────────
  # Rule 3: QQQ breakout requires sector ETF confirmation
  # ─────────────────────────────────────────────────────────────────────────
  # When QQQ closes above a 20-day high AND XLK (tech sector) shows
  # coincident 20-day MA strength, scale QQQ weight up. Fail-safe: missing
  # XLK data = no change.
  - name: "qqq_breakout_confirmed_by_xlk"
    type: multi_tf_confirmation
    target: QQQ
    primary_condition: "close > ref_high(20)"
    confirmations:
      - symbol: XLK
        timeframe: daily
        condition: "sma(close, 5) > sma(close, 20)"
    action:
      timing_scale_multiplier: 1.15
    priority: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Rule 4: Leveraged ETFs require dual-benchmark uptrend (R24 2026-04-22)
  # ─────────────────────────────────────────────────────────────────────────
  # TQQQ / SOXL are 3x leveraged — only allow exposure when BOTH SPY and
  # XLK are in 50/200 uptrend. Single-benchmark uptrend is insufficient
  # (leveraged ETFs decay viciously on whipsaw markets per CLAUDE.md
  # Phase B finding).
  - name: "leveraged_etfs_dual_confirmation"
    type: multi_tf_confirmation
    target: TQQQ
    primary_condition: "sma(close, 50) > sma(close, 200)"
    confirmations:
      - symbol: SPY
        timeframe: daily
        condition: "sma(close, 50) > sma(close, 200)"
      - symbol: XLK
        timeframe: daily
        condition: "sma(close, 20) > sma(close, 50)"
    action:
      timing_scale_multiplier: 1.10
    regime_scope: [BULL, RISK_ON]
    priority: 40

  # ─────────────────────────────────────────────────────────────────────────
  # Rule 5: Utility outperformance = defensive rotation signal (R24 2026-04-22)
  # ─────────────────────────────────────────────────────────────────────────
  # When XLU (utilities) 21d return > SPY 21d return (flight to defensive),
  # trim cyclical exposure (Mag7 Financial) via 0.85 multiplier. Historic
  # sector rotation signal — utilities lead bear turns by 2-4 weeks.
  - name: "xlu_outperformance_signals_defensive_rotation"
    type: benchmark_trigger
    driver: XLU
    # NOTE: Python `and` on Series triggers ambiguous-truth error; use `&` (pandas
    # bitwise) with parens. Before this fix (pre-2026-04-22) Rule 5 silently
    # failed every bar and was effectively disabled.
    condition: "(close > sma(close, 5)) & (sma(close, 21) > sma(close, 50))"
    action: allow_overweight
    targets: [XLU, XLP, TLT, GLD, JNJ]  # amplify defensive names, not cyclicals
    weight_multiplier: 1.10
    regime_scope: [CAUTIOUS, RISK_OFF, NEUTRAL]
    priority: 25

# Expanded Universe v1 — chart-structure Phase 4 (P4-R2)
#
# Authority: chart-structure ralph-loop execution PRD section 8 round P4-R2.
# Lineage: chart-structure-input-repr-2026-05-15.
#
# WHAT THIS IS
# ------------
# An ADDITIVE, opt-in RESEARCH universe. resolve_universe("expanded_v1")
# returns: the canonical executable 79 (built from config, bit-for-bit
# unchanged) PLUS the 249 symbols below, deduped, then SPY/QQQ
# appended. Total = 328.
#
# D6 ISOLATION CONTRACT
# ---------------------
# This file changes NOTHING for the default universe. resolve_universe()
# defaults to "executable" everywhere; "expanded_v1" is reached ONLY when
# a caller explicitly passes --universe expanded_v1. All prior 79-universe
# results (cycle04-12, forward candidates, Phase 1.5/1.6, chart-structure
# Phase 1/2A) are therefore never retroactively affected.
#
# SELECTION (deterministic, reproducible)
# ---------------------------------------
# Source: dev/scripts/chart_structure/phase4_universe_audit.py over the
# existing data/daily/*.parquet store. Filters: ticker ^[A-Z]{{1,5}}$;
# first bar <= 2015-02-01; last bar >= 2026-04-01; >= 2500 rows; 0
# weekend rows after re-fetch. Ranked by median(close*volume) over the
# last 252 bars, descending; top symbols not already in the executable 79.
# Liquidity floor of the selection: ~230M USD median daily dollar volume.
#
# DATA SOURCE / SEMANTICS (flagged caveat)
# ----------------------------------------
# 240 of these 249 symbols were re-ingested 2026-05-16 via
# YFinanceProvider(auto_adjust=True) — split + dividend ADJUSTED
# continuous series — because their pre-existing data/daily parquets
# carried weekend-row date-label corruption (the SPY off-by-one bug
# class). 11 (ORCL NFLX JPM V CRM XOM HD ABBV KO PEP SLV) were already
# clean polygon-derived. The executable 79 base keeps polygon raw bars +
# splits.parquet read-time cascade. expanded_v1 is therefore a
# MIXED-SOURCE panel; acceptable because (a) it is research-only, never
# execution, and (b) chart-structure features are scale-invariant ratios
# evaluated by rank-IC. See P4-R2 closeout for the provenance detail.

#
# AUDIT EXCLUSIONS (P4-R2 data audit, 2026-05-16)
# ----------------------------------------------------
# DOW + SE were in the top-liquidity selection but DROPPED: both
# IPO'd after 2015 (DOW Inc 2019-03-20, Sea Ltd 2017-10-20) and the
# yfinance batch fetch NaN-padded them back to a 2015 index. Their
# parquets were trimmed to real first-trade date; they do not meet
# the >=2015 clean-history bar, so they are not in expanded_symbols.

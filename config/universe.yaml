seed_pool:
  - SPY
  - QQQ
  - GLD
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - META
  - NVDA
  - TSLA
  - TQQQ
  - SOXL

# Sector ETFs (SPDR)
sector_etfs:
  - XLK   # Technology
  - XLF   # Financials
  - XLE   # Energy
  - XLV   # Health Care
  - XLI   # Industrials
  - XLY   # Consumer Discretionary
  - XLP   # Consumer Staples
  - XLU   # Utilities
  - XLB   # Materials
  - XLRE  # Real Estate
  - XLC   # Communication Services

# Factor ETFs
factor_etfs:
  - MTUM  # Momentum
  - QUAL  # Quality
  - VLUE  # Value
  - USMV  # Min Volatility
  - SCHD  # Dividend

# Cross-asset / Defensive
cross_asset:
  - TLT   # 20+ Year Treasury
  - IEF   # 7-10 Year Treasury
  - SHY   # 1-3 Year Treasury (cash proxy)
  - SLV   # Silver

# Macro reference series (non-tradeable, used for regime/features only)
macro_reference:
  - "^VIX"    # VIX volatility index
  - "^TNX"    # 10-year Treasury yield
  - "DX-Y.NYB"  # DXY dollar index proxy

# Guard factors that depend on volume semantics. For tickers coming from the
# trades_backfill pipeline, volume aggregation differs from the stocks-only
# CSV source — so factors in this list are masked to NaN for those tickers
# (see DataSensitivityConfig + factor_generator.apply_data_sensitivity_mask).
data_sensitivity:
  volume_sensitive_factors:
    - volume_surge_20d
    - price_volume_div
    - vwap_deviation
    - volume_weighted_skew
    - large_trade_intensity
    - exch_top1_volume_share
    - buy_volume_proxy_ratio
    - sell_volume_proxy_ratio
    - block_trade_rate
  rationale: "volume semantics unverified for trades_backfill tickers"

blacklist:
  - SQQQ
  - SOXS

# Point-in-time: first trade dates for survivorship bias prevention
# Symbols only enter candidate pool after first_trade_date + min_history_days
first_trade_dates:
  SPY: "1993-01-29"
  QQQ: "1999-03-10"
  GLD: "2004-11-18"
  AAPL: "1980-12-12"
  MSFT: "1986-03-13"
  GOOGL: "2004-08-19"
  AMZN: "1997-05-15"
  META: "2012-05-18"
  NVDA: "1999-01-22"
  TSLA: "2010-06-29"
  TQQQ: "2010-02-09"
  SOXL: "2010-03-11"
  XLK: "1998-12-22"
  XLF: "1998-12-22"
  XLE: "1998-12-22"
  XLV: "1998-12-22"
  XLI: "1998-12-22"
  XLY: "1998-12-22"
  XLP: "1998-12-22"
  XLU: "1998-12-22"
  XLB: "1998-12-22"
  XLRE: "2015-10-08"
  XLC: "2018-06-18"
  MTUM: "2013-04-16"
  QUAL: "2013-07-18"
  VLUE: "2013-04-16"
  USMV: "2011-10-20"
  SCHD: "2011-10-20"
  TLT: "2002-07-26"
  IEF: "2002-07-26"
  SHY: "2002-07-22"
  SLV: "2006-04-28"

high_risk_symbols:
  symbols: [TQQQ, SOXL]
  max_single_weight: 0.10
  max_total_weight: 0.12
  require_risk_on_regime: true
  left_side_trading_multiplier: 0.5

liquidity:
  min_avg_volume_30d: 1000000
  min_price_usd: 5.0
  min_history_days: 252

max_selected_symbols: 10
min_selected_symbols: 2

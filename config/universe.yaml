# Guard factors that depend on volume semantics. For tickers coming from the
# trades_backfill pipeline, volume aggregation differs from the stocks-only
# CSV source — so factors in this list are masked to NaN for those tickers
# (see DataSensitivityConfig + factor_generator.apply_data_sensitivity_mask).
data_sensitivity:
  volume_sensitive_factors:
    - volume_surge_20d
    - price_volume_div
    - vwap_deviation
    - volume_weighted_skew
    - large_trade_intensity
    - exch_top1_volume_share
    - buy_volume_proxy_ratio
    - sell_volume_proxy_ratio
    - block_trade_rate
    # Bucket A T1 batch 1 (PRD 20260512). 6 new volume-microstructure
    # factors with direct dependency on volume semantics. Masked for
    # trades_backfill tickers (ETF 2024+ inputs).
    - obv_norm_20d
    - vol_price_corr_20d
    - volume_surge_when_flat
    - chaikin_money_flow_20d
    - accum_dist_line_zscore_60d
    - klinger_oscillator
    # Bucket A T1 batch 2 (4-quadrant volume + breakout-decay).
    # Pure-OHLCV factors that derive directly from volume; mask under
    # trades_backfill provenance.
    - up_vol_ratio_20d
    - down_vol_ratio_20d
    - vol_weighted_ret_20d
    - pre_breakout_volume_decay
  rationale: "volume semantics unverified for trades_backfill tickers"

blacklist:
  - SQQQ
  - SOXS


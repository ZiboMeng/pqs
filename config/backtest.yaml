benchmarks: [SPY, QQQ]
primary_benchmark: SPY

# Global backtest date range — 2007 enables 2008-09 crisis stress testing
start_date: "2007-01-02"
end_date: null  # null = use latest available data

window_analysis:
  enabled: true
  warmup_bars: 252
  rolling_window_bars: 504     # 2 years
  rolling_step_bars: 63        # 3 months
  expanding_min_bars: 252      # 1 year minimum
  walk_forward_train_bars: 756 # 3 years
  walk_forward_test_bars: 126  # 6 months
  forward_block_holdout_bars: 252  # 1 year holdout

leakage_check:
  enabled: true
  check_signal_uses_future: true
  check_fill_price_valid: true

intraday:
  primary_freq: 60m
  position_allow_overnight: false
  eod_force_close: true
  eod_slippage_multiplier: 1.5
  avoid_first_bar: true
  avoid_last_n_bars: 1
  min_tradeable_bars_per_day: 3
  paper_trading_mode: eod_simulation
  polling_interval_minutes: 60
  intraday_uses_interday_regime: true
  intraday_max_position_pct: 0.50

  multi_timeframe:
    enabled: true
    aux_freqs: [30m, 15m]        # 60m primary; 30m+15m aux; 5m dropped per Q5
    graceful_degradation: true
    min_history_days:
      15m: 20
      30m: 20
    lookback_bars:
      30m: 8
      15m: 16
    # Initial static weights — overridden at runtime by TimeframeOptimizer
    timeframe_weights:
      60m: 0.45
      30m: 0.40
      15m: 0.15

  confluence_filter:
    enabled: true
    min_threshold: 0.60
    weak_threshold: 0.60
    strong_threshold: 0.80

# Tier D / walk-forward / factor-tier acceptance thresholds moved to
# config/acceptance.yaml on 2026-04-28 (PRD acceptance threshold
# unification step 4). Previously this section held a `validation:` block
# mirroring `core.config.schemas.backtest.ValidationConfig`; that schema
# was unused (no consumer), so both were removed when the new
# `AcceptanceThresholds` model + `config/acceptance.yaml` shipped.

# ── Strategy Mining Loop ──────────────────────────────────────────────────────
mining:
  # Quick evaluation gate (full-period backtest)
  quick_min_sharpe: 0.30
  quick_max_drawdown: 0.40
  quick_min_cagr: 0.02

  # OOS evaluation gate (walk-forward)
  # IR threshold lowered from 0.30 to 0.20: real open price execution
  # makes all metrics ~30% more conservative than close-to-close approximation
  oos_min_pass_rate: 0.55          # lowered from 0.60 — real open reduces pass rates
  oos_min_ir_vs_benchmark: 0.20    # lowered from 0.30 — overnight gap absorbs alpha
  oos_min_excess_return: 0.02      # lowered from 0.03

  # Robustness checks
  regime_robust_min_regimes: 2     # must be positive in N+ regimes
  cost_robust_multiplier: 2.0      # net alpha positive at 2x cost
  param_robust_max_sharpe_change: 0.50  # ±20% param → Sharpe change < 50%

  # Diversity filter
  diversity_max_correlation: 0.70  # max return correlation with promoted strategies

  # QQQ hard gate (P0.4, 2026-04-20). Strategies failing any of the 3
  # window excess checks are demoted to tier "D" and cannot promote.
  # Thresholds are minimum excess (strategy minus QQQ); 0.0 means
  # "strategy must at least equal QQQ".
  min_cagr_excess_vs_qqq:      0.0   # full-period strategy CAGR − QQQ CAGR
  min_holdout_excess_vs_qqq:   0.0   # holdout strategy return − QQQ return
  min_avg_oos_excess_vs_qqq:   0.0   # non-holdout excess CAGR (OOS proxy)

  # Optuna settings
  n_trials_per_type: 80            # Optuna trials per strategy type per run
  time_budget_seconds: 3600        # max wall-clock time per mining run
  sampler: tpe                     # tpe | random | cmaes

  # Promotion
  promote_top_n: 5                 # max strategies in active pool
  min_tier_to_promote: C           # C, B, A, S

  # Persistence
  optuna_db: "data/mining/optuna.db"
  archive_db: "data/mining/archive.db"
  equity_curve_dir: "data/mining/equity_curves"

  # Data isolation for anti-overfitting
  quick_data_fraction: 0.70       # Stage 1 quick filter uses first 70% of non-holdout data
  holdout_bars: 252               # Last 252 bars reserved as final holdout (invisible during mining)

  # Black swan stress periods (each must pass or strategy is demoted)
  stress_periods:
    - name: "financial_crisis_2008"
      start: "2007-10-01"
      end: "2009-03-31"
      max_drawdown_abs: 0.25
    - name: "covid_crash_2020"
      start: "2020-02-15"
      end: "2020-04-15"
      max_drawdown_abs: 0.25
    - name: "rate_hike_2022"
      start: "2022-01-01"
      end: "2022-12-31"
      max_drawdown_abs: 0.25
    - name: "q4_selloff_2018"
      start: "2018-10-01"
      end: "2018-12-31"
      max_drawdown_abs: 0.25

  # CRISIS regime pass: drawdown <= SPY same-period * crisis_dd_vs_spy_multiplier
  crisis_dd_vs_spy_multiplier: 1.0

  # Walk-forward test_bars by strategy rebalance frequency
  walk_forward_test_bars_by_type:
    trend_following: 126           # daily signals → 6 months OOS
    dual_momentum: 252             # monthly rebalance → 1 year OOS
    cross_asset_rotation: 252      # monthly rebalance → 1 year OOS
    multi_factor: 126              # daily rebalance → 6 months OOS
    _default: 189                  # fallback for unknown types

  # OOS/IS overfit detection
  min_oos_is_sharpe_ratio: 0.50    # OOS Sharpe / IS Sharpe < this → Tier D

  # Regime-aware OOS window pass criteria
  # Defensive windows (CRISIS/RISK_OFF/CAUTIOUS): relaxed — drawdown <= benchmark * multiplier
  defensive_window_dd_multiplier: 1.3

  # Composite score weights (for ranking candidates)
  score_weights:
    oos_ir: 2.0
    oos_sharpe: 1.0
    oos_excess_return: 5.0
    max_drawdown_penalty: 3.0
    regime_robust_bonus: 1.0
    cost_robust_bonus: 0.5
    param_robust_bonus: 0.5

# Notification backend for paper / live trading alerts.
#
# To enable:
#   1. Set `enabled: true`
#   2. Pick backend (wecom_bot / server_chan / stdout / null)
#   3. Populate credentials. Environment variables are supported via ${VAR}.
#
# Credentials MUST live in env vars, never committed to this file.
notify:
  enabled: false
  backend: stdout          # wecom_bot | server_chan | stdout | null
  min_level: info          # debug | info | warning | error | critical
  rate_limit:
    max_per_window: 20     # events
    window_seconds: 60
  wecom_bot:
    # WeChat Work group bot webhook. Get one by:
    # WeChat Work admin backend → create group ≥2 members → group settings
    # → 群机器人 → add → copy the URL with ?key=xxx
    webhook_url: "${PQS_WECOM_WEBHOOK_URL}"
  server_chan:
    # Server 酱 Turbo (sct.ftqq.com). Free tier: 5/day.
    send_key: "${PQS_SCT_SEND_KEY}"

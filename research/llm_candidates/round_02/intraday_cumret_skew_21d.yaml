factor_name: "intraday_cumret_skew_21d"
hypothesis: >
  The skewness of the intraday CUMULATIVE return path across the 7 RTH
  60m bars captures asymmetric within-day drift shape. Positive skew
  indicates late-day bursts higher (path starts flat, finishes with
  a rally); negative skew indicates early-day decline with later
  recovery. Path shape encodes information content beyond magnitude
  (realized_vol) or serial correlation (intraday_autocorr).
formula: >
  per_day_cumret = cumsum of intraday 60m bar-to-bar returns within RTH
  skew = scipy-style skewness of the per-day cumret path (7 points)
  feat = skew.rolling(21).mean()
  cross-sectional z-score per date (uses .rolling() — past only)
required_fields: [close]  # 60m close bars, RTH 10:00-16:00
suitable_horizon: [21d]
suitable_universe: "Mag7 + liquid ETFs"
suitable_regime: [NEUTRAL, CAUTIOUS, RISK_ON]
expected_edge: "IC ~0.02-0.04 on 21d horizon; stronger in earnings season clusters"
expected_risk: "Only 7 points per day makes skewness noisy; small-sample skew bias"
possible_failure_modes:
  - "skew estimator with N=7 is high-variance; relies on 21d averaging to stabilize"
  - "may correlate with intraday_autocorr_21d (path shape ↔ serial corr)"
  - "fails in range-bound markets where no shape dominates"
novelty_vs_existing_factors: >
  realized_vol_60m_21d measures only magnitude of intra-day moves.
  intraday_autocorr_21d measures pairwise lag-1 correlation. Neither
  captures the *shape* of the intraday path as a skewed distribution.
  Skew measures asymmetry, which is orthogonal to variance and serial
  correlation mathematically.
compute_fn_path: "research.llm_candidates.round_02.compute_fns:intraday_cumret_skew_21d"

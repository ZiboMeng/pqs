# Source: Codex (external LLM handoff per docs/20260421-llm_external_llm_handoff.md)
# Round: 20
# Submitted: 2026-04-21
factor_name: "down_up_beta_spread_126d"
hypothesis: >
  Some stocks behave very differently in down markets versus up markets.
  The spread between down-beta and up-beta may capture convexity,
  hidden defensiveness, or fragile high-beta exposure better than a
  single unconditional beta proxy.
formula: |
  ret = close.pct_change()
  down_mask = (SPY_ret < 0)
  up_mask = (SPY_ret > 0)
  down_beta = rolling_cov(stock_ret, SPY_ret on down_mask, 126) / rolling_var(SPY_ret on down_mask, 126)
  up_beta = rolling_cov(stock_ret, SPY_ret on up_mask, 126) / rolling_var(SPY_ret on up_mask, 126)
  feat_raw = down_beta - up_beta
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_02.compute_fns:down_up_beta_spread_126d"
required_fields: ["close"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [all]
expected_edge: "negative or positive depending on regime; main value is asymmetry detection rather than raw direction"
expected_risk: "Estimate is noisy because conditional beta uses fewer observations than unconditional beta"
possible_failure_modes:
  - "high estimation noise in calm periods"
  - "can proxy sector composition instead of true asymmetry"
  - "beta asymmetry may be more useful as risk filter than alpha factor"
novelty_vs_existing_factors: >
  Current registry has market_trend and benchmark-relative return
  signals, but not conditional beta asymmetry. This is a state-dependent
  exposure feature rather than a plain performance feature.

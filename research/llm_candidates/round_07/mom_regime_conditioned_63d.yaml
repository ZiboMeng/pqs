factor_name: "mom_regime_conditioned_63d"
hypothesis: >
  63-day momentum gated by 200-day SPY EMA regime. In bull regimes
  momentum continues (positive signal); in bear regimes momentum
  inverts (high-momentum names mean-revert faster). The PRD mentions
  regime-conditioned factors as LLM-7 direction; this is the simplest
  such construction. Round 7 mining showed +0.0873 IC on panel vs
  mom_63d alone +0.029 — the regime gate is doing the work.
formula: >
  mom_63 = close.pct_change(63)
  spy_ema200 = SPY.ewm(span=200).mean()
  trend = sign(SPY > spy_ema200)
  feat = mom_63 * trend
  cross-sectional z-score per date (past-only)
required_fields: [close]  # needs SPY in price_df columns
suitable_horizon: [21d, 63d]
suitable_universe: "全 universe with SPY benchmark"
suitable_regime: [BULL, RISK_ON, NEUTRAL, CAUTIOUS, RISK_OFF]  # regime is IN the factor
expected_edge: "IC ~0.06-0.09 on 21d horizon"
expected_risk: "Turnover spikes at regime transitions; may have high correlation with classical mom_63d in bull regimes"
possible_failure_modes:
  - "partial correlation with mom_63d (same data, same horizon)"
  - "regime gate is binary; continuous soft gate (SPY vs EMA distance) may be smoother"
  - "spy_trend_200d is already a production factor — this is mom × that"
novelty_vs_existing_factors: >
  mom_63d and spy_trend_200d are both in research registry. Their
  additive combination is what MultiFactorStrategy composite effectively
  does. This multiplicative interaction has fundamentally different
  behavior: in bull the signals reinforce, in bear they invert. Not
  expressible as linear composite.
compute_fn_path: "research.llm_candidates.round_07.compute_fns:mom_regime_conditioned_63d"

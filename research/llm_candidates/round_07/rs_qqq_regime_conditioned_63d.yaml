factor_name: "rs_qqq_regime_conditioned_63d"
hypothesis: >
  63-day relative strength vs QQQ, GATED by 200-day SPY EMA trend.
  In bull regimes (SPY > 200d EMA) the RS vs QQQ signal points in
  its natural direction; in bear regimes the sign flips so the factor
  measures stocks that HURT LESS than QQQ. This captures the regime-
  conditional behavior that Round 6 XGBoost detected as the #3 most
  important feature despite rs_vs_qqq_63d having only +0.029 univariate
  IC. The interaction uses SPY trend as a per-date regime gate.
formula: >
  ret_63 = close.pct_change(63)
  rs_qqq_63 = ret_63 - QQQ.pct_change(63)
  spy_ema200 = SPY.ewm(span=200).mean()
  trend = sign(SPY > spy_ema200)   # +1 bull, -1 bear, per date
  feat = rs_qqq_63 * trend
  cross-sectional z-score per date (past-only via .ewm, .pct_change)
required_fields: [close]  # needs SPY and QQQ in price_df columns
suitable_horizon: [21d, 63d]
suitable_universe: "SPY + QQQ + Mag7 + sector ETFs"
suitable_regime: [BULL, RISK_ON, NEUTRAL, CAUTIOUS, RISK_OFF]  # all — regime is IN the factor
expected_edge: "IC ~0.05-0.09 on 21d horizon (Round 7 mining showed +0.087 on panel)"
expected_risk: "Whipsaw risk at SPY ≈ 200d EMA; sign-discontinuity noise around regime boundaries"
possible_failure_modes:
  - "binary regime gate adds noise at boundary; smoothed EMA-distance might be better"
  - "correlated with regime-conditioned variations of rs_vs_spy_*"
  - "in CRISIS mode SPY < 200d EMA persistently; factor inverts may cause turnover"
novelty_vs_existing_factors: >
  rs_vs_spy_* and rs_vs_qqq_* (Round 1) are univariate RS factors.
  spy_trend_200d is a market regime indicator alone. NO existing factor
  combines RS with regime gate. Round 6 XGBoost importance shows the
  combination is the source of rs_vs_qqq_63d's nonlinear value.
compute_fn_path: "research.llm_candidates.round_07.compute_fns:rs_qqq_regime_conditioned_63d"

factor_name: "breakout_20d_persistence_63d"
hypothesis: >
  Fraction of last 63 trading days where close > prior 20-day rolling
  high. Captures the "broke out and held" path pattern — a stock
  consistently above its prior monthly high is in persistent uptrend.
  Distinct from classical momentum (which measures return magnitude)
  and max_dd factors (single extrema): this is PATH-SHAPE based.
  Expected positive IC — persistence predicts continuation in BULL/
  RISK_ON regimes.
formula: >
  prior_20d_high = close.shift(1).rolling(20).max()
  above = (close > prior_20d_high).astype(float)
  feat = above.rolling(63).mean()
  cross-sectional z-score per date (uses .shift, .rolling — past only)
required_fields: [close]
suitable_horizon: [21d, 63d]
suitable_universe: "全 universe (needs ≥20 bar history)"
suitable_regime: [BULL, RISK_ON, NEUTRAL]
expected_edge: "IC ~0.04-0.08 on 21d horizon; stronger in bull regimes"
expected_risk: "High correlation with mom_* factors; may dedup"
possible_failure_modes:
  - "overlaps with drawup_from_252d_low and mom_63d (all measure 'above recent high/distance from low')"
  - "binary breakout signal can be noisy at stock level; 63d smoothing helps"
  - "fails in choppy / sideways regimes where prior highs are frequent"
novelty_vs_existing_factors: >
  mom_21d/63d/126d measure return magnitude. drawup_from_252d_low
  measures distance from rolling LOW. max_dd_126d from rolling HIGH.
  This measures TIME-IN-BREAKOUT path shape — distinct from all three.
  The fraction of time spent above rolling peak is not a magnitude
  or distance measure.
compute_fn_path: "research.llm_candidates.round_13.compute_fns:breakout_20d_persistence_63d"

# Round: 19
# Submitted: 2026-04-21
factor_name: "trend_efficiency_63d"
hypothesis: >
  Among stocks with similar 63-day returns, those that reached the same
  endpoint with less day-to-day chop should represent cleaner trend
  leadership and carry more persistent forward edge.
formula: |
  daily_ret = close.pct_change()
  net_ret_63 = close.pct_change(63)
  path_len_63 = daily_ret.abs().rolling(63, min_periods=40).sum()
  feat_raw = net_ret_63 / path_len_63
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_01.compute_fns:trend_efficiency_63d"
required_fields: ["close"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [BULL, RISK_ON, NEUTRAL]
expected_edge: "positive, IC 0.02-0.05 if clean-trend persistence matters more than endpoint-only momentum"
expected_risk: "Can overlap with momentum and low-vol; late-stage parabolic leaders may look efficient right before reversal"
possible_failure_modes:
  - "dedup with existing momentum family if path-length adds little incremental ordering"
  - "sharp trend reversals after very clean runs"
  - "cross-sectional z-score unstable when many symbols have similar path efficiency"
novelty_vs_existing_factors: >
  Existing momentum factors focus on endpoint return magnitude, while
  path_accel_21d focuses on acceleration. This candidate emphasizes path
  smoothness over 63d, which is not explicitly represented in
  PRODUCTION_FACTORS or current RESEARCH_FACTORS.

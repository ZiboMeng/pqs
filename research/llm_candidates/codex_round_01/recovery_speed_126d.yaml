# Source: Codex (external LLM handoff per docs/llm_external_llm_handoff.md)
# Round: 19
# Submitted: 2026-04-21
factor_name: "recovery_speed_126d"
hypothesis: >
  Recovery from an intermediate-term low is more informative when it
  happens quickly. Two stocks can be equally above their 126-day low,
  but the one that recovered faster may signal stronger sponsorship and
  better forward persistence.
formula: |
  low_126 = close.rolling(126, min_periods=63).min()
  drawup_126 = close / low_126 - 1
  days_since_low = bars since the most recent rolling 126d low
  feat_raw = drawup_126 / days_since_low
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_01.compute_fns:recovery_speed_126d"
required_fields: ["close"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [NEUTRAL, CAUTIOUS, RISK_ON]
expected_edge: "positive, IC 0.02-0.05 if post-drawdown recovery leadership persists"
expected_risk: "Can chase oversold bounces that mean-revert; sensitive to noisy rolling-low resets"
possible_failure_modes:
  - "overfits rebound periods immediately after market shocks"
  - "rolling-low detection can reset too often in sideways regimes"
  - "correlated with drawup_from_252d_low without enough incremental signal"
novelty_vs_existing_factors: >
  PRODUCTION includes drawup_from_252d_low, which measures distance from
  a longer-term low. This candidate adds a SPEED dimension using a 126d
  window and time-since-low denominator rather than pure drawup level.

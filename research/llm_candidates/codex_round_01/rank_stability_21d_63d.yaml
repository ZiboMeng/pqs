# Source: Codex (external LLM handoff per docs/llm_external_llm_handoff.md)
# Round: 19
# Submitted: 2026-04-21
factor_name: "rank_stability_21d_63d"
hypothesis: >
  Durable leaders should not only rank highly on 63-day momentum, they
  should also hold those ranks consistently over the last month. Stable
  rank leadership may be more robust than one-off rank spikes.
formula: |
  mom_63 = close.pct_change(63)
  rank_63 = mom_63.rank(axis=1, pct=True)
  mean_rank_21 = rank_63.rolling(21, min_periods=10).mean()
  std_rank_21 = rank_63.rolling(21, min_periods=10).std()
  feat_raw = mean_rank_21 / std_rank_21
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_01.compute_fns:rank_stability_21d_63d"
required_fields: ["close"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [BULL, NEUTRAL, CAUTIOUS]
expected_edge: "positive, IC 0.02-0.04 if persistent cross-sectional leadership beats transient spikes"
expected_risk: "Can be redundant with rank-based factors and may over-reward stale winners late in trend cycles"
possible_failure_modes:
  - "high correlation with xsection_rank_63d and above_median_persistence_63d"
  - "low incremental value when rank ordering is already stable across the panel"
  - "trend reversals hurt stable-winner bias"
novelty_vs_existing_factors: >
  Existing cross-sectional factors capture current rank, rank change, or
  above-median persistence. This candidate focuses on the inverse of rank
  volatility: mean rank over 21d scaled by rank instability, which is a
  distinct stability-oriented construction.

factor_name: "volume_trend_interaction"
hypothesis: "Price momentum confirmed by expanding intermediate volume implies stronger conviction than momentum on fading volume."
formula: |
  price_ret = pct_change(close, 21)
  vol_trend = rolling_mean(volume, 21) / rolling_mean(volume, 63)
  factor = price_ret * vol_trend
compute_fn_path: "research.llm_candidates.Gemini_round_02.compute_fns:volume_trend_interaction"
required_fields: ["close", "volume"]
suitable_horizon: [21]
suitable_universe: "expanded_53"
suitable_regime: ["all"]
expected_edge: "Positive IC (+0.04). Rewards high-conviction moves."
expected_risk: "Correlated with standard momentum during massive volume blow-off tops."
possible_failure_modes:
  - "Volume spikes due to index rebalancing rather than organic flow."
  - "Earnings gaps skewing the volume average."

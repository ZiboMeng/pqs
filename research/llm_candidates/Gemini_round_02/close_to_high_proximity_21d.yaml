factor_name: "close_to_high_proximity_21d"
hypothesis: "Assets pinning near their recent rolling high exhibit persistent absorption of supply and readiness to break out."
formula: |
  high_21 = rolling_max(high, 21)
  low_21 = rolling_min(low, 21)
  factor = (close - low_21) / (high_21 - low_21)
compute_fn_path: "research.llm_candidates.Gemini_round_02.compute_fns:close_to_high_proximity_21d"
required_fields: ["close", "high", "low"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: ["RISK_ON", "BULL"]
expected_edge: "Positive IC (+0.04). Classic Williams %R inversion logic for long-only."
expected_risk: "Fails in mean-reverting chop regimes where the high acts as resistance."
possible_failure_modes:

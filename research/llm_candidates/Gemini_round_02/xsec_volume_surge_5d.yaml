factor_name: "xsec_volume_surge_5d"
hypothesis: "Assets exhibiting the highest volume surge relative to peers indicate concentrated cross-sectional capital accumulation."
formula: |
  vol_ratio = rolling_mean(volume, 5) / rolling_mean(volume, 63)
  factor = cross_sectional_rank(vol_ratio)
compute_fn_path: "research.llm_candidates.Gemini_round_02.compute_fns:xsec_volume_surge_5d"
required_fields: ["volume"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: ["all"]
expected_edge: "Positive IC (+0.035). Identifies where the 'action' is moving."
expected_risk: "Prone to buying climax tops if not combined with price trend."
possible_failure_modes:

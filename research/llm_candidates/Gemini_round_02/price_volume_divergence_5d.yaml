factor_name: "price_volume_divergence_5d"
hypothesis: "Short-term price jumps not backed by equivalent volume jumps are suspect; filtering for aligned short-term price/volume rank ensures genuine participation."
formula: |
  ret_rank = cross_sectional_rank(pct_change(close, 5))
  vol_rank = cross_sectional_rank(volume / rolling_mean(volume, 21))
  factor = ret_rank + vol_rank
compute_fn_path: "research.llm_candidates.Gemini_round_02.compute_fns:price_volume_divergence_5d"
required_fields: ["close", "volume"]
suitable_horizon: [5]
suitable_universe: "expanded_53"
suitable_regime: ["RISK_ON"]
expected_edge: "Positive IC (+0.03). Helps validate 5-day momentum."
expected_risk: "Very noisy; short-term volume is highly erratic."
possible_failure_modes:
  - "Cross-sectional ranks squashed together in low-dispersion markets."
  - "Chasing short-term exhaustion climaxes."
novelty_vs_existing_factors: "Factor interaction via rank-addition; combines short-term momentum and relative volume."

factor_name: "volatility_term_structure_ratio"
hypothesis: "When short-term volatility collapses relative to medium-term volatility, it indicates consolidation prior to a trend continuation."
formula: |
  vol_5d = rolling_std(pct_change(close, 1), 5)
  vol_21d = rolling_std(pct_change(close, 1), 21)
  factor = -1 * (vol_5d / vol_21d)

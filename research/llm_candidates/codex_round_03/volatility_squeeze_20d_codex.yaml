# Source: Codex (external LLM handoff per docs/20260421-llm_external_llm_handoff.md)
# Round: 21
# Submitted: 2026-04-21
factor_name: "volatility_squeeze_20d_codex"
hypothesis: >
  Stocks with positive 20-day drift but unusually compressed recent
  volatility versus their own longer-term baseline may be in
  consolidation before breakout, creating a short-horizon continuation edge.
formula: |
  ret = close.pct_change()
  ret_20d = close.pct_change(20)
  vol_20d = ret.rolling(20, min_periods=10).std()
  vol_126d = ret.rolling(126, min_periods=40).std()
  feat_raw = ret_20d / (vol_20d / vol_126d)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_03.compute_fns:volatility_squeeze_20d_codex"
required_fields: ["close"]
suitable_horizon: [5, 10, 21]
suitable_universe: "expanded_53"
suitable_regime: [BULL, RISK_ON, NEUTRAL]
expected_edge: "positive, IC 0.015-0.03"
expected_risk: "Breakout traps in sideways or distribution regimes"
possible_failure_modes:
  - "false squeezes in low-vol dead money names"
  - "breakout failure immediately after volatility compression"
  - "can overlap with momentum when squeeze denominator varies little cross-sectionally"
novelty_vs_existing_factors: >
  Combines endpoint return with a short-vs-long volatility ratio rather
  than plain risk-adjusted momentum. The consolidation angle is not
  directly encoded in current production factors.

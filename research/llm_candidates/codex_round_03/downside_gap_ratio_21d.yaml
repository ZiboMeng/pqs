# Round: 21
# Submitted: 2026-04-21
factor_name: "downside_gap_ratio_21d"
hypothesis: >
  Comparing a stock's average return on SPY-down days to its average
  return on SPY-up days may reveal asymmetric resilience that ordinary
  beta or relative-strength measures miss.
formula: |
  daily_ret = close.pct_change()
  weak_mean = rolling_mean(stock_ret where SPY_ret < 0, 21)
  strong_mean = rolling_mean(stock_ret where SPY_ret >= 0, 21)
  feat_raw = weak_mean / abs(strong_mean)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_03.compute_fns:downside_gap_ratio_21d"
required_fields: ["close"]
suitable_horizon: [5, 10, 21]
suitable_universe: "expanded_53"
suitable_regime: [CAUTIOUS, RISK_OFF, NEUTRAL]
expected_edge: "positive, IC 0.015-0.03 if asymmetric defense persists"
expected_risk: "Small denominator can create unstable ratios"
possible_failure_modes:
  - "ratio spikes due to tiny strong-day returns"
  - "too few weak-day observations in calm markets"
  - "can behave like a noisy defensive screen"
novelty_vs_existing_factors: >
  Similar spirit to downside resilience but expressed as a weak-vs-strong
  day asymmetry ratio, which is a distinct conditional construction.

# Source: Codex (external LLM handoff per docs/llm_external_llm_handoff.md)
# Round: 21
# Submitted: 2026-04-21
factor_name: "trend_stall_score_21_63"
hypothesis: >
  A stock near its 63-day high but with weakening short-term return
  versus its longer trend may be stalling before reversal. This can be a
  useful anti-momentum or exhaustion-aware ranking input.
formula: |
  ret_21 = close.pct_change(21)
  ret_63 = close.pct_change(63)
  dist_to_63_high = abs(close / rolling_max(close, 63) - 1)
  feat_raw = (ret_21 - ret_63) - dist_to_63_high
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_03.compute_fns:trend_stall_score_21_63"
required_fields: ["close"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: [NEUTRAL, CAUTIOUS]
expected_edge: "negative or reversal-oriented IC if stalling leaders underperform next"
expected_risk: "May fight strong trends too early"
possible_failure_modes:
  - "persistent winners keep running despite stall signal"
  - "distance-to-high term can dominate return differential"
  - "works better as reversal sleeve than standalone long-only rank"
novelty_vs_existing_factors: >
  This blends near-high geometry with recent-vs-long return deceleration,
  which is different from raw reversal or raw momentum.

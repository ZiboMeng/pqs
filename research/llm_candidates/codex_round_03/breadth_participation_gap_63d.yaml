# Source: Codex (external LLM handoff per docs/llm_external_llm_handoff.md)
# Round: 21
# Submitted: 2026-04-21
factor_name: "breadth_participation_gap_63d"
hypothesis: >
  A stock whose short-term share of positive days is rising above its
  own longer-term participation rate may be entering a fresh breadth
  expansion phase before raw momentum fully reflects it.
formula: |
  daily_ret = close.pct_change()
  pos_share_5 = rolling_mean(daily_ret > 0, 5)
  pos_share_63 = rolling_mean(daily_ret > 0, 63)
  feat_raw = pos_share_5 - pos_share_63
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_03.compute_fns:breadth_participation_gap_63d"
required_fields: ["close"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: [BULL, NEUTRAL, CAUTIOUS]
expected_edge: "positive, IC 0.01-0.03 if improving participation leads return acceleration"
expected_risk: "Very short-term; can be noisy and reverse quickly"
possible_failure_modes:
  - "one-week noise dominates true participation trend"
  - "highly mean-reverting after sharp event-driven bursts"
  - "may overlap with short-horizon reversal in choppy tapes"
novelty_vs_existing_factors: >
  Existing cross-sectional factors focus on rank, dispersion, or panel-level breadth.
  This candidate is symbol-level participation acceleration.

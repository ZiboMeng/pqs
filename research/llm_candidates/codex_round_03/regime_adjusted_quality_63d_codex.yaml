factor_name: "regime_adjusted_quality_63d_codex"
hypothesis: >
  Quality is more valuable when the market backdrop is deteriorating
  than when speculative beta dominates. Applying a market-state
  multiplier to rolling Sharpe may improve the timing of the quality factor.
formula: |
  sharpe_63 = rolling_mean(daily_ret, 63) / rolling_std(daily_ret, 63)
  regime_multiplier = derived from regime or SPY drawdown state
  feat_raw = sharpe_63 * regime_multiplier
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_03.compute_fns:regime_adjusted_quality_63d_codex"
required_fields: ["close", "regime"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [all]
expected_edge: "positive, IC 0.015-0.03 if quality timing matters more than static quality"
expected_risk: "Late regime recognition can overweight defensives after the move already happened"
possible_failure_modes:
  - "lags V-shaped recoveries"
  - "degenerates to ordinary quality when regime multiplier changes slowly"
  - "regime proxy may be too coarse for cross-sectional timing"
novelty_vs_existing_factors: >
  Existing quality proxies are unconditional. This candidate attempts a
  state-conditioned overlay so quality exposure rises when the market
  weakens and is damped during strong speculative tapes.

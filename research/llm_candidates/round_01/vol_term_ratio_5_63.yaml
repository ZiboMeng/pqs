factor_name: "vol_term_ratio_5_63"
hypothesis: >
  Rising short-term realized vol relative to long-term realized vol
  signals regime change at the name level. High ratio can precede either
  overreaction reversals (short-vol spike from noise) or directional
  trend acceleration (short-vol spike from news). Net signal is
  mean-reversion biased given historical regime evidence.
formula: >
  short_vol = pct_change().rolling(5).std()
  long_vol  = pct_change().rolling(63).std()
  ratio = short_vol / long_vol
  cross-sectional z-score per date (uses .rolling() — past only)
required_fields: [close]
suitable_horizon: [5d, 21d]
suitable_universe: "全 universe"
suitable_regime: [NEUTRAL, CAUTIOUS, RISK_OFF]
expected_edge: "IC ~0.02-0.05 on 21d horizon; stronger in vol-transition periods"
expected_risk: "Fails in trending regimes where high short-vol accompanies continuation; noisy in low-vol environments"
possible_failure_modes:
  - "high turnover due to short 5d window — cost-sensitive"
  - "low vol environments (VIX < 12) compress the ratio → weak signal"
  - "correlated with vol_regime factor (must check via dedup)"
novelty_vs_existing_factors: >
  vol_regime compares current vol to its own historical percentile;
  vol_21d / vol_63d are level factors. No existing factor measures the
  within-name term-structure ratio of short vs long vol. Different info
  content: this flags VOL ACCELERATION, not vol LEVEL.
compute_fn_path: "research.llm_candidates.round_01.compute_fns:vol_term_ratio_5_63"

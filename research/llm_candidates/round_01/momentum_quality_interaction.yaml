factor_name: "momentum_quality_interaction"
hypothesis: >
  High-momentum names with LOW realized volatility are "high-quality
  momentum" — the return came from sustained drift rather than
  noise. Existing composite treats momentum and low-vol as independent
  additive factors; this multiplicative interaction isolates names
  scoring well on both simultaneously.
formula: >
  mom_63d = close.pct_change(63)
  vol_63d = close.pct_change().rolling(63).std()
  vol_rank = vol_63d.rank(pct=True) [cross-sectional per date]
  interaction = mom_63d * (1 - vol_rank)
  cross-sectional z-score per date (uses .pct_change, .rolling — past only)
required_fields: [close]
suitable_horizon: [21d, 63d]
suitable_universe: "全 universe"
suitable_regime: [BULL, RISK_ON, NEUTRAL, CAUTIOUS]
expected_edge: "IC ~0.03-0.07 on 21d horizon; interaction term potentially adds 0.01-0.02 over additive momentum+low-vol"
expected_risk: "High correlation with momentum; incremental value only demonstrated when rank ordering differs from pure momentum"
possible_failure_modes:
  - "redundant with additive composite of momentum + low_vol (dedup likely flags)"
  - "fails in high-vol rebound regimes where top-momentum names have elevated vol"
  - "exposure to quality-growth tilt — may underperform in value rotation"
novelty_vs_existing_factors: >
  PRODUCTION_FACTORS contains `momentum` and `low_vol` as independent
  inputs. No multiplicative interaction term exists. This is a classical
  "quality momentum" factor construction that, if shown to add incremental
  value over linear composite, would expand the strategy's expressivity.
compute_fn_path: "research.llm_candidates.round_01.compute_fns:momentum_quality_interaction"

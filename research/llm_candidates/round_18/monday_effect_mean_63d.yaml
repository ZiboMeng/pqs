factor_name: "monday_effect_mean_63d"
hypothesis: >
  Rolling 63-day mean return on Mondays captures per-symbol "Monday
  effect" — the historical tendency of Monday returns to have
  directional bias (often negative post-weekend info absorption).
  Classical calendar anomaly. Very unlikely to have material IC in
  a Mag7-heavy universe (too efficient), but worth documenting as
  the weakest calendar effect exists.
formula: >
  ret = close.pct_change()
  mask = (index.dayofweek == 0)  # Monday
  masked_ret = ret * mask
  feat = masked_ret.rolling(63).sum() / mask.rolling(63).sum()
  cross-sectional z-score per date (past-only)
required_fields: [close]
suitable_horizon: [21d]
suitable_universe: "全 universe"
suitable_regime: [NEUTRAL, CAUTIOUS]
expected_edge: "IC ~0 on 21d horizon; Mag7 efficient market erodes classical calendar effects"
expected_risk: "Monday effect historically fades in large-cap universes"
possible_failure_modes:
  - "efficient market erosion of anomalies"
  - "63d smoothing over ~13 Mondays — high variance per-symbol"
  - "expected weak or null signal — menu coverage exercise"
novelty_vs_existing_factors: >
  No existing factor captures day-of-week patterns. This is genuinely
  novel for the registry, though expected to fail the IC screen.
compute_fn_path: "research.llm_candidates.round_18.compute_fns:monday_effect_mean_63d"

factor_name: "monthstart_first5d_mean_63d"
hypothesis: >
  Rolling 63-day mean return on the first 5 trading days of each
  month. "Turn-of-month effect" — historically new-month inflows
  (401k contributions, fund rebalancing to target weights) create
  upward bias in first week. Counterpart to monthend_last5d; signs
  may differ across universe/regime.
formula: >
  mask = (date is among first 5 trading days of its month)
  ret = close.pct_change()
  masked_ret = ret * mask
  feat = masked_ret.rolling(63).sum() / mask.rolling(63).sum()
  cross-sectional z-score per date (past-only)
required_fields: [close]
suitable_horizon: [21d]
suitable_universe: "全 universe"
suitable_regime: [NEUTRAL, BULL, RISK_ON]
expected_edge: "IC ~0.01-0.03 on 21d horizon"
expected_risk: "Likely correlated with monthend factor; possibly redundant"
possible_failure_modes:
  - "inflows-based anomaly attenuated in Mag7-heavy ETF universe"
  - "correlation with monthend_last5d may trigger dedup"
  - "63d window ~3 month-start samples → noisy"
novelty_vs_existing_factors: >
  Counterpart construct to monthend factor; neither exists in current
  registry. Menu coverage exercise.
compute_fn_path: "research.llm_candidates.round_18.compute_fns:monthstart_first5d_mean_63d"

factor_name: "rs_vs_equal_weight_63d"
hypothesis: >
  63-day return relative to the cross-sectional EQUAL-WEIGHTED mean of
  the universe isolates idiosyncratic alpha from panel beta. Because
  SPY and QQQ are market-cap-weighted (Mag7-dominated), a stock's
  return vs SPY can be polluted by benchmark-composition effects. An
  equal-weighted panel benchmark removes that bias — names that beat
  the EW mean are truly outperforming their peers on an equal-dollar
  basis.
formula: >
  ret_63d = close.pct_change(63)
  ew_mean = ret_63d.mean(axis=1)  [cross-sectional per date]
  rs_ew   = ret_63d - ew_mean
  cross-sectional z-score per date (past-only, uses .pct_change())
required_fields: [close]
suitable_horizon: [21d, 63d]
suitable_universe: "全 universe (needs breadth for meaningful EW mean)"
suitable_regime: [NEUTRAL, CAUTIOUS, RISK_ON, BULL]
expected_edge: "IC ~0.04-0.07 on 21d horizon; stronger when cap-weighted vs equal-weight spread is large"
expected_risk: "By construction very similar to xsection_rank (measures within-panel relative performance); may dedup"
possible_failure_modes:
  - "expected high correlation with xsection_rank_63d (both are panel-relative)"
  - "small universe (<15 symbols) makes EW mean unstable"
  - "collapses in regime where all symbols move together (pure beta moves)"
novelty_vs_existing_factors: >
  rs_vs_spy_* use market-cap benchmark. xsection_rank_* use within-panel
  RANK. This factor uses within-panel EW MEAN — a linear (not rank)
  cross-sectional benchmark. Mathematically distinct from xsection_rank
  by the rank → mean transformation; may give additional signal on
  extreme tail names that rank-rescaling compresses.
compute_fn_path: "research.llm_candidates.round_04.compute_fns:rs_vs_equal_weight_63d"

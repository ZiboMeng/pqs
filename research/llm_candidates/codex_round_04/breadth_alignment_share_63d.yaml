factor_name: "breadth_alignment_share_63d"
hypothesis: "Stocks that participate disproportionately on strong-breadth days while avoiding weakness on poor-breadth days may sit in the market's favored leadership cohort."
formula: |
  ret_1d = close.pct_change()
  breadth_1d = (ret_1d > 0).mean(axis=1)
  strong_breadth = breadth_1d > 0.60
  weak_breadth = breadth_1d < 0.40
  strong_hit = masked_mean((ret_1d > 0).astype(float), strong_breadth, 63, 15)
  weak_hit = masked_mean((ret_1d > 0).astype(float), weak_breadth, 63, 15)
  feat_raw = strong_hit - weak_hit
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:breadth_alignment_share_63d"
required_fields: ["close"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: "all"
expected_edge: "positive, IC roughly 0.01-0.03 if breadth leadership remains persistent"
expected_risk: "Can become noisy when breadth oscillates around thresholds; shares can compress in quiet periods"
possible_failure_modes:
  - "High hit-rate on strong-breadth days just proxies market beta"
  - "Weak-breadth sample count is too small in sustained bullish tapes"
novelty_vs_existing_factors: "This uses conditional hit-rate by breadth state rather than average return on weak-breadth days; expected overlap with weak_breadth_resilience_63d is moderate but not extreme, around 0.25-0.4."

factor_name: "ew_tail_resilience_63d"
hypothesis: "Names that hold up best on the equal-weight universe's weakest days may represent broad-market downside resilience that is not fully captured by SPY-only stress filters."
formula: |
  ret_1d = close.pct_change()
  ew_ret_1d = ret_1d.mean(axis=1)
  tail_cut_63 = ew_ret_1d.rolling(63, min_periods=20).quantile(0.20)
  tail_mask = ew_ret_1d <= tail_cut_63
  feat_raw = masked_mean(ret_1d, tail_mask, window=63, min_periods=15)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:ew_tail_resilience_63d"
required_fields: ["close"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [CAUTIOUS, RISK_OFF, NEUTRAL]
expected_edge: "positive, IC roughly 0.02-0.04 if downside survivors continue to rank well after broad weak sessions"
expected_risk: "Can tilt defensive and lag sharply in risk-on rebounds; threshold choice matters"
possible_failure_modes:
  - "Equal-weight tail days differ from tradable stress events in narrow leadership markets"
  - "Defensive laggards screen well simply because they fall slightly less than the group"
novelty_vs_existing_factors: "This is equal-weight tail conditioning rather than SPY-down-day conditioning, so it is related to but distinct from downside_resilience and market_drawdown style ideas; expected correlation around 0.25-0.45."

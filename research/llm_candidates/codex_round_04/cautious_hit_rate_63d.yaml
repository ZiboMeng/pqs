factor_name: "cautious_hit_rate_63d"
hypothesis: "Stocks that still print positive daily returns more often in cautious regimes may represent higher-quality survivors with better downside compounding."
formula: |
  ret_1d = close.pct_change()
  cautious = regime in {CAUTIOUS, RISK_OFF}
  feat_raw = masked_mean((ret_1d > 0).astype(float), cautious, 63, 10)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:cautious_hit_rate_63d"
required_fields: ["close", "regime"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [CAUTIOUS, RISK_OFF, NEUTRAL]
expected_edge: "positive, IC roughly 0.01-0.03 if stress-tape survivors remain relatively strong afterward"
expected_risk: "Can favor slow defensive names with limited upside capture once the market recovers"
possible_failure_modes:
  - "Cautious regime windows are too sparse to estimate a stable hit-rate"
  - "Post-stress rebounds favor cyclical losers rather than prior cautious winners"
novelty_vs_existing_factors: "This is a regime-specific hit-rate signal, not a return mean or volatility measure; expected overlap with downside resilience family should be moderate, around 0.2-0.4."

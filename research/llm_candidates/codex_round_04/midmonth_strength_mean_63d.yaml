factor_name: "midmonth_strength_mean_63d"
hypothesis: "Stocks with persistent strength in the middle of the month may benefit from recurring contribution and rebalance flows that are less crowded than turn-of-month effects."
formula: |
  ret_1d = close.pct_change()
  midmonth_mask = day_of_month in [11..15]
  feat_raw = masked_mean(ret_1d, midmonth_mask, window=63, min_periods=8)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:midmonth_strength_mean_63d"
required_fields: ["close"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: "all"
expected_edge: "small positive, IC roughly 0.00-0.02 if the mid-month pocket contains persistent flow behavior"
expected_risk: "Likely noisy and calendar-fragile; holiday shifts can materially change the sample"
possible_failure_modes:
  - "Mid-month behavior is random and washes out over longer samples"
  - "A few sector-specific rebalance months dominate the measured mean"
novelty_vs_existing_factors: "This is narrower than month_half_rotation and different from archived monthstart/monthend ideas, so expected overlap with prior event candidates should be limited."

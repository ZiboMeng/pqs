factor_name: "median_reclaim_strength_63d"
hypothesis: "Fresh reclaims above a stock's own rolling 63-day median may identify early trend repairs before the move becomes obvious in long-horizon momentum."
formula: |
  median_63 = close.rolling(63, min_periods=30).median()
  gap_63 = close / median_63 - 1
  reclaim_flag = close.shift(10) < median_63.shift(10)
  feat_raw = where(reclaim_flag, gap_63, 0)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:median_reclaim_strength_63d"
required_fields: ["close"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: [CAUTIOUS, NEUTRAL, RISK_ON]
expected_edge: "positive, IC roughly 0.01-0.03 if repaired structures keep improving after the reclaim"
expected_risk: "Can become sparse and noisy when many names never dip below their median; may also buy into false reclaims"
possible_failure_modes:
  - "Mean-reverting tapes repeatedly cross the median without trend persistence"
  - "Late-cycle strong leaders never qualify because they stayed above the median throughout"
novelty_vs_existing_factors: "This is centered on median-level recapture, not endpoint return or rank change; expected overlap with momentum/reversal is moderate-low, around 0.15-0.3."

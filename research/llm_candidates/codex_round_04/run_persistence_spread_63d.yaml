factor_name: "run_persistence_spread_63d"
hypothesis: "Stocks with many positive days and few sign flips may exhibit steadier sponsorship than names reaching the same endpoint via choppy reversals."
formula: |
  ret_1d = close.pct_change()
  pos_share_63 = (ret_1d > 0).rolling(63, min_periods=20).mean()
  switch_rate_63 = sign(ret_1d).diff().ne(0).rolling(63, min_periods=20).mean()
  feat_raw = pos_share_63 - switch_rate_63
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:run_persistence_spread_63d"
required_fields: ["close"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: [NEUTRAL, RISK_ON]
expected_edge: "positive, IC roughly 0.01-0.03 if smoother directional persistence carries forward"
expected_risk: "Can resemble quality/trend-efficiency behavior and may lag after violent V-shaped reversals"
possible_failure_modes:
  - "Very low-vol drift names dominate despite weak absolute upside"
  - "Fast regime flips reward choppier rebound paths that this factor penalizes"
novelty_vs_existing_factors: "This focuses on run structure rather than return magnitude; it should be less correlated with momentum than plain 63d return and only modestly overlap low_vol/quality, around 0.2-0.35."

factor_name: "regime_volatility_selectivity_63d"
hypothesis: "Stocks whose volatility expands less in cautious regimes than in favorable regimes may reflect stronger structural sponsorship and cleaner holdability."
formula: |
  ret_1d = close.pct_change()
  favorable = regime in {BULL, RISK_ON}
  cautious = regime in {CAUTIOUS, RISK_OFF}
  favorable_vol = masked_std(ret_1d, favorable, window=63, min_periods=10)
  cautious_vol = masked_std(ret_1d, cautious, window=63, min_periods=10)
  feat_raw = -(cautious_vol / favorable_vol)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:regime_volatility_selectivity_63d"
required_fields: ["close", "regime"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: "all"
expected_edge: "positive, IC roughly 0.01-0.03 if calm-under-stress names keep attracting capital"
expected_risk: "Can drift toward low-vol defensives and miss fast upside beta when the tape improves"
possible_failure_modes:
  - "Sparse cautious-regime observations create unstable denominators"
  - "Crowded defensive names become expensive and underperform despite low stress volatility"
novelty_vs_existing_factors: "This is regime-conditional volatility behavior rather than unconditional low_vol or regime-gated momentum; expected correlation to low_vol should be moderate, around 0.3-0.45."

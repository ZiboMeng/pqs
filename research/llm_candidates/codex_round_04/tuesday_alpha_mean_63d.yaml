factor_name: "tuesday_alpha_mean_63d"
hypothesis: "A persistent Tuesday return edge may proxy for recurring institutional rebalance or post-Monday information digestion effects."
formula: |
  ret_1d = close.pct_change()
  tuesday_mask = index.dayofweek == 1
  feat_raw = masked_mean(ret_1d, tuesday_mask, window=63, min_periods=8)
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:tuesday_alpha_mean_63d"
required_fields: ["close"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: "all"
expected_edge: "small positive, IC roughly 0.00-0.02 if weekday behavior is persistent rather than noise"
expected_risk: "High risk of weak signal and calendar instability; effect may be diluted by holidays and market structure changes"
possible_failure_modes:
  - "Weekday seasonality is not stable out of sample"
  - "A few outsized Tuesdays dominate the rolling average"
novelty_vs_existing_factors: "Distinct from the archived Monday/month-start/month-end proposals because it targets a different weekday pocket and avoids turn-of-month structure; expected correlation to existing production factors should be low."

factor_name: "weekday_balance_spread_63d"
hypothesis: "Stocks whose returns cluster in the middle of the week rather than at the edges may be less headline-driven and more flow-supported."
formula: |
  ret_1d = close.pct_change()
  midweek = index.dayofweek in {1, 2, 3}
  edge_days = index.dayofweek in {0, 4}
  midweek_mean = masked_mean(ret_1d, midweek, 63, 12)
  edge_mean = masked_mean(ret_1d, edge_days, 63, 12)
  feat_raw = midweek_mean - edge_mean
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:weekday_balance_spread_63d"
required_fields: ["close"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: "all"
expected_edge: "small positive, IC roughly 0.00-0.02 if weekday flow balance is persistent"
expected_risk: "Very prone to noise and holiday effects; could just capture random calendar clustering"
possible_failure_modes:
  - "Mon/Fri gaps dominate and swamp any midweek behavior"
  - "Signal becomes unstable when market narratives concentrate around specific weekdays"
novelty_vs_existing_factors: "This compares weekday groups instead of isolated Monday or turn-of-month windows, so it should remain fairly orthogonal to existing factor families."

factor_name: "break_even_recovery_21_63"
hypothesis: "Names that recover strongly from their recent 21-day low without already sitting stretched near a 63-day high may have cleaner continuation room."
formula: |
  low_21 = close.rolling(21, min_periods=10).min()
  high_63 = close.rolling(63, min_periods=30).max()
  recovery_21 = close / low_21 - 1
  gap_to_high_63 = abs(close / high_63 - 1)
  feat_raw = recovery_21 - gap_to_high_63
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:break_even_recovery_21_63"
required_fields: ["close"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: [NEUTRAL, CAUTIOUS, RISK_ON]
expected_edge: "positive, IC roughly 0.01-0.03 if early recovery leaders outperform before becoming overextended"
expected_risk: "Can over-own weak bounce candidates in bear rallies; may also fade true breakouts near highs"
possible_failure_modes:
  - "Bear-market reflex rallies fail quickly after short recoveries"
  - "Strong momentum leaders already near highs keep working and this factor underweights them"
novelty_vs_existing_factors: "This is a short-low recovery minus medium-high extension tradeoff, different from raw drawup_from_252d_low or reversal signals; expected correlation to drawup/reversal family is modest, around 0.2-0.35."

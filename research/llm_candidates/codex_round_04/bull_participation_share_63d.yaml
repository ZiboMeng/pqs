factor_name: "bull_participation_share_63d"
hypothesis: "Names with unusually high positive-day participation in favorable regimes may capture latent upside beta that keeps paying in continued risk-on tapes."
formula: |
  ret_1d = close.pct_change()
  favorable = regime in {BULL, RISK_ON}
  favorable_share = masked_mean((ret_1d > 0).astype(float), favorable, 63, 10)
  all_share = (ret_1d > 0).rolling(63, min_periods=20).mean()
  feat_raw = favorable_share - all_share
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:bull_participation_share_63d"
required_fields: ["close", "regime"]
suitable_horizon: [5, 21]
suitable_universe: "expanded_53"
suitable_regime: [RISK_ON, BULL]
expected_edge: "positive, IC roughly 0.01-0.03 if upside participation leadership persists over the next few weeks"
expected_risk: "Can overfit to scarce BULL observations and may behave like latent beta in hot tapes"
possible_failure_modes:
  - "BULL sample size is too small to stabilize the rolling share"
  - "Market leadership rotates away from the prior high-beta winners very quickly"
novelty_vs_existing_factors: "This uses favorable-regime hit-rate relative to unconditional hit-rate, not unconditional momentum or market-trend gating; expected overlap with momentum/market_trend is moderate, around 0.2-0.35."

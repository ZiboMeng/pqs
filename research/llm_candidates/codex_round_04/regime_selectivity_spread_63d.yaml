# Source: Gemini 2.5 (external LLM handoff per PRD M15)
# Round: 27
# Submitted: 2026-04-22
factor_name: "regime_selectivity_spread_63d"
hypothesis: "Stocks that earn meaningfully better returns in favorable regimes than they lose in cautious regimes may capture regime-selective participation that plain unconditional momentum misses."
formula: |
  ret_1d = close.pct_change()
  favorable_mask = regime in {BULL, RISK_ON}
  cautious_mask = regime in {CAUTIOUS, RISK_OFF}
  favorable_mean_63 = masked_mean(ret_1d, favorable_mask, window=63, min_periods=10)
  cautious_mean_63 = masked_mean(ret_1d, cautious_mask, window=63, min_periods=10)
  feat_raw = favorable_mean_63 - cautious_mean_63
  feat = cross-sectional z-score(feat_raw.shift(1))
compute_fn_path: "research.llm_candidates.codex_round_04.compute_fns:regime_selectivity_spread_63d"
required_fields: ["close", "regime"]
suitable_horizon: [21, 63]
suitable_universe: "expanded_53"
suitable_regime: "all"
expected_edge: "positive, IC roughly 0.02-0.03 if regime-selective winners continue to lead across subsequent 1-3 month windows"
expected_risk: "Sample count per regime can be thin, especially for BULL and RISK_OFF; factor may become unstable when regime labels cluster heavily in one state"
possible_failure_modes:
  - "Sparse favorable or cautious observations create noisy rolling means"
  - "If market leadership flips abruptly after regime transitions, historical regime selectivity stops carrying forward"
novelty_vs_existing_factors: "This differs from market_trend and prior regime-conditioned momentum ideas because it measures stock-specific return spread across labeled regimes instead of multiplying a base factor by a market-state scalar; estimated correlation to production factors should be modest, around 0.2-0.35."

# Promotion Criteria — Track C Cycle #09 (cycle04-08 sibling escape via
# 95-factor library expansion + new-family-anchor REQUIREMENT)
#
# Authority:
#   - docs/prd/20260512-cycle_09_diversified_anchor_search_prd.md
#   - docs/memos/20260512-z1_factor_diagnostics_synthesis_strict.md
#     (strict train-only IC ranking; informs archetype selection)
#   - docs/memos/20260512-quant_factor_literature_synthesis_v2.md
#     (37-topic literature review motivating 95-factor expansion)
#   - docs/memos/20260512-trial9_diversifier_001_closeout.md
#     (v1 completed_fail; trial9_diversifier_002 active forward candidate)
#   - User explicit-go 2026-05-12 "都按照你的推荐走"

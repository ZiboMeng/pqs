#   - docs/memos/20260430-track_c_cycle_2026-04-30-02_close.md (cycle #02
#     refuted C-1 horizon hypothesis)
#   - docs/memos/20260430-track_c_cycle_2026-04-30-01_close.md (cycle #01
#     refuted naive global top-N at 21d)
#   - docs/memos/20260501-heterogeneous_split_fix_executed.md (canonical
#     data restored 2026-05-01)
#   - docs/memos/20260501-cycle03_path_decision.md (axis decision: cap-aware
#     construction with risk_cluster + max_single caps)
#   - User explicit go (zibo, 2026-05-01, "根据你的经验选最优路径 然后开工")
#   - User cluster-design feedback 2026-05-01 (operator chose single-layer
#     17 risk clusters per docs/memos/20260501-cycle03_path_decision.md)
#
# REPLACEMENT NOTE:
#   This lineage SUPERSEDES track-c-cycle-2026-05-01-01 (sha256
#   5df2c305...). That earlier yaml had a typo: `mining_config.trials`
#   instead of canonical `mining_config.n_trials`, causing the miner CLI
#   yaml-to-CLI mapping to silently fall back to default 50 trials. Only
#   3 trials archived. The -01 archive is INVALID and should be ignored
#   in any closeout (operator self-audit found, not user). This -02
#   yaml restores the correct field name and re-runs mining at full 200
#   trials. No other parameter changed.
#
# Lineage tag:    track-c-cycle-2026-05-01-02
# Authored:       2026-05-01
# Authored by:    Claude (operator) under user explicit-go
# Authoring axis: cap-aware construction = risk_cluster + max_single caps
#
# IMMUTABILITY CONTRACT:
#   Once this file is committed with sha256 recorded in commit message,
#   ALL fields below are FROZEN for this lineage.
#
# SHA256 verification:
#   sha256sum data/research_candidates/track-c-cycle-2026-05-01-02_promotion_criteria.yaml

lineage_tag: track-c-cycle-2026-05-01-02
panel_max_date_at_freeze: 2024-12-31
freeze_date: 2026-05-01
factor_registry_pool: RESEARCH_FACTORS
data_source_canonical: post_rebuild_2026_05_01_canonical  # commit be387d3
end_date: 2025-12-31  # G4 cutoff

drop_symbols:
  - BRK-B  # round-3 step3b drop, no_1m_data


# ── Construction (NEW for cycle #03) ──────────────────────────────────

construction:
  mode: cap_aware
  rebalance_cadence: monthly
  top_n: 10
  cluster_map_module: core.research.risk_cluster_map.STOCK_RISK_CLUSTER_MAP
  cluster_cap: 0.20
  max_single_weight: 0.10
  min_holding_days: 1
  long_only: true
  no_short: true
  no_margin: true


# ── Mining ──────────────────────────────────────────────────────────────

mining_config:
  sampler: tpe
  seed: 42
  n_trials: 200                  # CORRECT canonical field name (was
                                 # `trials` in -01 yaml; that was the typo)
  min_families: 3
  max_features_per_family: 2
  composite_cardinality: 3
  composite_weighting: equal_weight
  archive_db: data/mining/rcm_archive.db
  optuna_db: data/mining/rcm_optuna.db
  out_dir: data/ml/research_miner/track-c-cycle-2026-05-01-02
  panel_start_date: "2007-01-02"
  panel_end_date: "2025-12-31"
  temporal_split_role: core
  factor_registry_source: core/factors/factor_registry.py
  factor_registry_pool: RESEARCH_FACTORS
  explicit_exclusions:
    - intraday_autocorr_21d
    - intraday_vol_ratio_21d
    - realized_vol_60m_21d


# ── Hard requirements (Track A acceptance gates) ──────────────────────

hard_requirements:
  composite_ic_ir_full_period_min: 0.30
  walk_forward_ic_ir_min_per_fold: 0.0
  composite_cardinality: 3
  fwd_return_horizon_days: 21    # SAME as cycle #01 → single-variable diff
  ic_evaluation_lag_bars: 1


# ── Hard blockers ─────────────────────────────────────────────────────

hard_blockers:
  - any_validation_year_maxdd_above_0_20
  - any_stress_slice_maxdd_above_0_25
  - validation_aggregate_excess_vs_qqq_le_0
  - validation_2025_role_hard_gate_failure


# ── Anti-sibling discipline ───────────────────────────────────────────

anti_sibling_discipline:
  factor_overlap_threshold: 2
  realized_nav_correlation_pooled_max: 0.85
  realized_nav_correlation_residual_max: 0.70
  classification_thresholds:
    pooled_lt_0_50:    true_diversifier
    pooled_0_50_0_70:  partial_diversifier
    pooled_0_70_0_85:  warn_label_void
    pooled_gte_0_85:   reject_step5


# ── Report-only / interpretive ──────────────────────────────────────

report_only:

  regime_stability_per_regime_ir:
    must_report_regimes:
      - BULL
      - BEAR
      - RISK_ON
      - RISK_OFF
      - CRISIS
      - SIDEWAYS

  benchmark_beta_statistics:
    must_report:
      - portfolio_weighted_mean_beta
      - portfolio_weighted_std_beta
      - max_abs_per_symbol_beta
      - n_symbols_with_beta

  stress_slice_diagnostics:
    must_report_per_slice:
      - covid_flash
      - rate_hike_2022
    fields:
      - cum_ret
      - sharpe
      - max_dd
      - vs_spy
      - vs_qqq

  turnover_proxy:
    must_report: true

  cluster_diversity:
    must_report:
      - n_unique_clusters_per_rebalance_avg
      - cluster_concentration_max
      - n_picks_avg
      - implicit_cash_pct_avg
      - top_3_clusters_by_average_weight

  composite_nav_correlation_vs_existing_pair:
    must_report:
      - rcm_v1_pooled_pearson_raw
      - rcm_v1_pooled_pearson_residual_vs_spy
      - rcm_v1_pooled_pearson_residual_vs_qqq
      - cand_2_pooled_pearson_raw
      - cand_2_pooled_pearson_residual_vs_spy
      - cand_2_pooled_pearson_residual_vs_qqq

  human_path_knowledge_inventory:
    today_date: "2026-05-01"
    declared_2026_observations:
      - "Cycle #01 (21d global top-N): Tier-2 sibling
         {beta_spy_60d, mom_12_1, volume_ratio_20d}, IC_IR=0.6562
         (pre-rebuild)."
      - "Cycle #02 (5d weekly): Tier-2 sibling, IDENTICAL composite
         to cycle #01, IC_IR=1.0592 (pre-rebuild). C-1 horizon
         refuted."
      - "Heterogeneous split-adjustment fixed 2026-05-01 (commit
         be387d3); 78/78 sym scan-clean. Panel n_obs 3021→1511."
      - "Step 0 RCMv1 retro β: 0.143-0.314. Naive C-3 β=0.75 cap
         won't bind."
      - "track-c-cycle-2026-05-01-01 yaml had typo (trials: 200
         instead of n_trials: 200). Mining silently ran 50 default.
         3 trials archived; INVALID. -02 (this yaml) supersedes."
      - "Cycle #03 (this -02) tests cap-aware construction at 21d
         horizon. Single-variable diff vs cycle #01 = +cap_aware."



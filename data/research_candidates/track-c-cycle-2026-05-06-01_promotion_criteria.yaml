# Promotion Criteria — Track C Cycle #06 (PRD-AC v1.1 dry-run mining)
#
# Authority:
#   - docs/prd/20260505-mining_objective_nav_based_plus_execution_policy_prd.md (PRD-AC v1.1)
#   - docs/memos/20260505-prd_ac_e_critique_log.md (PRD-AC 20-issue critique log)
#   - docs/memos/20260506-i9_boundary_artifact_finding.md (Phase 2 round 2 I9 fix)
#   - docs/memos/20260426-research_layer_partial_unfreeze.md (research layer)
#   - docs/memos/20260501-track_c_cycle_2026-05-01-04_close.md (cycle #04 close;
#     Tier 2 sibling-by-NAV; informed Phase 4 cycle #06 design)
#   - User explicit-go (zibo, 2026-05-06, "继续推 Phase 3 ... 收掉之后进 3 4")
#
# IMMUTABILITY CONTRACT:
#   Once this file is committed with sha256 recorded in commit message,
#   ALL fields below are FROZEN for this lineage. If any threshold turns
#   out wrong in hindsight, the next research cycle gets new criteria;
#   this lineage's bar does NOT move.
#
# SHA256 verification:
#   sha256sum data/research_candidates/track-c-cycle-2026-05-06-01_promotion_criteria.yaml
#
# Lineage tag:    track-c-cycle-2026-05-06-01
# Authored:       2026-05-06
# Authored by:    Claude (operator) under user explicit-go + PRD-AC v1.1
# Authoring axis: NAV-based mining objective + holding_freq search dim
#                 (PRD-AC v1.1; single-axis differential vs cycle #04)
#                 = same universe + construction as cycle #04, BUT:
#                   (i)  objective_version = v2_nav_based (NAV-Sharpe +
#                        max_dd_penalty in weighted sum)
#                   (ii) holding_freq_choices = [monthly, weekly, daily]
#                        (TPE search dim; cycle #04 was monthly-only)
#                   (iii) enable_sr_defer_choices = [false] only (Phase 3
#                         round 2 will add True branch + 60m-bar load)
#                   (iv) anchor orthogonality REPORTED (nav_correlation_vs_
#                        anchor stamped per trial) but NOT penalized
#                        (w_nav_orthogonality = 0.0; Phase 4 calibration
#                        decides round 2 setting)


lineage_tag: track-c-cycle-2026-05-06-01
panel_max_date_at_freeze: 2024-12-31
freeze_date: 2026-05-06
factor_registry_pool: RESEARCH_FACTORS
data_source_canonical: post_rebuild_2026_05_01_canonical_plus_yfinance_backfill_2009_2014
end_date: 2025-12-31  # G4 cutoff (validation 2025 visible to selector,
                       # not to miner; sealed 2026 NEVER read)

drop_symbols:
  - BRK-B  # round-3 step3b drop, no_1m_data
  - USO    # cycle #04 preflight §"USO 单独提示" — futures roll yield +
           # 2 single-day jumps > 50% in 2020 oil collapse; out of scope
  - SLV    # not cluster-mapped in cycle #04; reserve for future cross-asset
           # expansion that includes additional commodity sleeves


# ── Universe (cycle #04 config retained for direct comparison) ────────

universe_extension:
  mode: stocks_plus_cross_asset
  stocks_count: 53          # 54 base − BRK-B drop
  cross_asset_count: 6      # TLT, IEF, SHY, GLD, BIL, SHV
  total_eligible: 59
  cluster_count_total: 22   # 17 stock + 5 cross-asset
  cross_asset_cluster_map_module: core.research.risk_cluster_map.CROSS_ASSET_RISK_CLUSTER_MAP
  unified_cluster_map_helper: core.research.risk_cluster_map.make_unified_cluster_map
  asset_class_map_module: core.research.risk_cluster_map.ASSET_CLASS_BY_CLUSTER


# ── Construction (cycle #04 config retained) ──────────────────────────

construction:
  mode: cap_aware_cross_asset
  rebalance_cadence: monthly  # DEFAULT; overridden per-trial by holding_freq sample
  top_n: 10
  cluster_cap: 0.20
  max_single_weight: 0.10
  min_holding_days: 1
  long_only: true
  no_short: true
  no_margin: true
  asset_class_caps:
    equities_max:    0.70
    bonds_max:       0.40
    commodities_max: 0.20
    cash_anchor_max: 0.30
  asset_class_min_report_only:
    non_equity_weight_avg_min_report: 0.15  # NOT enforced; report-only
    non_equity_weight_p25_min_report: 0.05  # NOT enforced; report-only


# ── Mining (PRD-AC v1.1 v2_nav_based) ─────────────────────────────────

mining_config:
  sampler: tpe
  seed: 42
  n_trials: 200
  min_families: 3
  max_features_per_family: 2
  composite_cardinality: 3
  composite_weighting: equal_weight
  archive_db: data/mining/rcm_archive.db
  optuna_db: data/mining/rcm_optuna.db
  out_dir: data/ml/research_miner/track-c-cycle-2026-05-06-01
  panel_start_date: "2009-01-02"
  panel_end_date: "2025-12-31"
  temporal_split_role: core
  factor_registry_source: core/factors/factor_registry.py
  factor_registry_pool: RESEARCH_FACTORS
  explicit_exclusions:
    - intraday_autocorr_21d
    - intraday_vol_ratio_21d
    - realized_vol_60m_21d

  # PRD-AC v1.1 §4.7 v2_nav_based objective
  objective_version: v2_nav_based
  objective_weights:
    # Legacy weighted-sum (kept ~80% of total weight on IR-side)
    w_ir:               0.70
    w_turnover:         0.05
    w_corr_conc:        0.05
    w_bench_excess:     0.0
    w_regime_stddev:    0.0
    # PRD-AC v1.1 NAV-based extension (~20% of total weight)
    w_nav_sharpe:           0.15
    w_nav_max_dd_penalty:   0.05
    # Orthogonality + qqq excess: REPORTED but not penalized this cycle.
    # Phase 4 anchor calibration smoke decides whether to enable in cycle07+.
    w_nav_orthogonality:    0.0
    w_vs_qqq_excess:        0.0

  # PRD-AC v1.1 §4.5 Phase 3 round 1 search-space dims
  holding_freq_choices: [monthly, weekly, daily]
  enable_sr_defer_choices: [false]   # round 1 stub; round 2 will add true


# ── Hard requirements (Track A acceptance gates per PRD §5.3) ─────────

hard_requirements:
  composite_ic_ir_full_period_min: 0.30
  walk_forward_ic_ir_min_per_fold: 0.0
  composite_cardinality: 3
  fwd_return_horizon_days: 21
  ic_evaluation_lag_bars: 1


# ── Hard blockers ─────────────────────────────────────────────────────

hard_blockers:
  - any_validation_year_maxdd_above_0_20
  - any_stress_slice_maxdd_above_0_25
  - validation_aggregate_excess_vs_qqq_le_0    # full-period vs QQQ; HARD
  - validation_2025_role_hard_gate_failure     # 2025 vs QQQ excess > 0; HARD


# ── Phase 4 NAV-objective-specific report-only metrics ────────────────

phase_4_nav_specific_report_only:
  must_report_distribution_across_all_archived_trials:
    - nav_sharpe                                    # train-only, gap-masked
    - nav_max_dd                                    # train-only, gap-masked
    - nav_correlation_vs_anchor_pooled_raw          # SPY-residual anchor
    - nav_vs_qqq_excess_full_period                 # train-only, gap-masked
    - holding_freq_chosen_distribution              # daily/weekly/monthly counts
    - enable_sr_defer_chosen_distribution           # all false in round 1
  must_report_top_10_trials:
    - same as above + factors + weights + objective_version
  anchor_calibration_diagnostic:
    must_report:
      - nav_corr_anchor_distribution_p25_p50_p75_p95
      - n_trials_below_threshold_0_50
      - n_trials_in_band_0_50_0_70
      - n_trials_above_0_70
    decision_rule_post_mining: |
      If ≥ 30% of trials below 0.50 raw corr → Option β anchor viable;
      consider enabling w_nav_orthogonality=1.0 in cycle07+.
      If < 10% of trials below 0.50 → fall back to Option γ (skip
      orthogonality term entirely; document in closeout).
      Between 10-30% → directional discussion; user decision.


# ── R41 informational (PRD I18 fix: Tier 2 still counts as nominee) ───

r41_informational:
  apply_anchors:
    - rcm_v1_defensive_composite_01
    - candidate_2_orthogonal_01
  classification_thresholds:
    pooled_raw_pearson_lt_0_50:    true_diversifier
    pooled_raw_pearson_0_50_0_70:  partial_diversifier
    pooled_raw_pearson_0_70_0_85:  warn_label_void
    pooled_raw_pearson_gte_0_85:   reject_step5
  i18_decision_rule: |
    Per PRD-AC §5.3 I18 fix: a spec passing Track A acceptance + Phase 4
    smoke deliverables but R41-classified as Tier 2 (sibling-by-NAV vs
    RCMv1 / Cand-2) STILL counts as a nominee. Closeout memo MUST
    surface "R41 informational = Tier <N>, sibling-by-NAV with
    raw NAV correlation [value]" and the user decides downstream
    promotion at Track D time. PRD-AC delivers evidence; user decides
    promotion.


# ── Smoke-abort gate (operator-added, cycle04 lineage convention) ────

smoke_abort_clause:
  enabled: true
  smoke_n_trials: 8
  decision_metric: any_v2_nav_based_trial_archived_ok_with_finite_nav_sharpe
  thresholds:
    abort_if_zero_finite_nav_sharpe_in_8_trials: true
  abort_action: |
    do_not_run_full_200_trial_mining; close cycle in smoke-abort state;
    surface to user — likely indicates NAV gate is broken or panel /
    anchor / harness_config wiring issue post Phase 2 round 2 changes.


# ── 2025 QQQ soft-miss trade-off (cycle #04 lineage) ──────────────────

post_2025_qqq_soft_miss_trade_off_clause:
  enabled: true
  trigger_when_all_satisfied:
    - validation_2025_excess_vs_qqq_lt_0
    - validation_2025_excess_vs_spy_gt_0
    - full_period_excess_vs_qqq_gt_0
    - validation_2025_max_dd_le_qqq_2025_max_dd_minus_5pp
  action_on_trigger: |
    Closeout records "soft 2025 QQQ miss with diversifier offset".
    Surface to user as informed choice on whether to soften the 2025
    QQQ hard gate to a directional warning. Cycle still closes 0
    nominee; user decision required on gate softening before the
    candidate can advance.


# ── Hypothesis pre-registration ───────────────────────────────────────

hypotheses:
  H1_v2_objective_changes_top_10_ranking: |
    PRD §5.2 acceptance: Spearman rank correlation top-10 v2 vs v1 < 0.7
    AND ≥ 3 trials in v2 top-10 not in v1 top-10. Tests whether the
    NAV-Sharpe + max_dd_penalty terms materially shift selection.

  H2_holding_freq_search_explores_3_cells: |
    PRD §5.2 acceptance: TPE distributes 200 trials across all 3 cells
    (monthly / weekly / daily) with min 30 trials per cell. Tests
    whether the search dim is exercised, not collapsed to a single
    cadence by IC-only ranking.

  H3_v2_top_1_nav_sharpe_geq_v1_top_1_nav_sharpe: |
    PRD §5.2 acceptance: post-mining, the v2-objective top-1 trial's
    nav_sharpe is ≥ the v1-equivalent top-1 trial's nav_sharpe (compute
    v1 ranking by setting all w_nav_*=0 in post-hoc objective recompute).
    Tests whether v2 mining produces a Pareto improvement on NAV-Sharpe.

  H4_anchor_corr_distribution_informs_orthogonality_decision: |
    Per Phase 4 §4.6 calibration: post-mining histogram of
    nav_correlation_vs_anchor_pooled_raw across 200 trials informs
    whether Option β anchor is viable for cycle07+ (≥ 30% below 0.50)
    or falls back to Option γ (< 10% below 0.50).



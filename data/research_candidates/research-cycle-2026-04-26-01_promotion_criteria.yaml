# ── Meta ────────────────────────────────────────────────────────────
lineage_tag: research-cycle-2026-04-26-01
schema_version: "1.0"
document_type: pre_registered_promotion_criteria
purpose: |
  Future-candidate nominee gate for ONE mining cycle. NOT a
  retroactive rule for the current pair (RCMv1 / Cand-2 are
  unaffected). NOT itself an evidence_class — see
  EvidenceClass enum in core/research/robustness/window_spec.py
  for the OOS evidence taxonomy this lineage's nominees will
  eventually produce.

  This document defines:
    - what a candidate must achieve to be ELIGIBLE as the lineage's
      nominee (G2.A hard_requirements)
    - what context fields the candidate's S1 artifact set must
      report regardless of pass/fail (G2.B report_only)
    - the mining configuration permitted under this authorization
      (mining_config)


# ── G2.A — HARD REQUIREMENTS (must-pass; gate the nomination) ───────
# A candidate that fails ANY field in this section is NOT eligible
# to be the lineage's nominee. Numeric thresholds are binary.
hard_requirements:

  # Cross-sectional rank-IC IR over the full mining window.
  # Reference points: RCMv1 0.4951 (S2/production); Cand-2 0.116
  # (S2); random-baseline best on RCMv1's space was 0.336. Bar at
  # 0.25 is meaningfully above noise but achievable for a well-
  # designed composite without forcing RCMv1-class strength —
  # we want to stockpile diverse candidates, not clones.
  min_ic_ir_full_period: 0.25

  # Walk-forward fold positivity. RCMv1 had 4/4 positive over its
  # 4 folds. Bar at 3/4 keeps a meaningful regime-coverage bar
  # without requiring perfect run.
  min_walk_forward_folds_positive: 3
  walk_forward_n_folds: 4

  # M12 concentration tier ceiling. "warning" means candidates
  # hitting `pass` or `warning` are eligible; `manual_review_required`
  # is NOT (post-M12-audit-fix gate per
  # docs/memos/20260425-m12_review_decision.md).
  m12_concentration_tier_ceiling: warning

  # Watch-list total share ceiling (weight-day share on watch-list
  # symbols, summed). Existing references: RCMv1 57.73% (extreme);
  # Cand-2 31.07%. Bar at 0.30 forces new candidates to be more
  # diversified away from watch-list factor ETFs (QUAL/SOXL/MTUM/
  # KLAC/etc.) than EITHER existing candidate. Deliberately strict
  # to prevent next round from repeating the same problem.
  watchlist_total_share_ceiling: 0.30

  # Thin-data weighted share ceiling. Aligned with PRD v3 §C extreme
  # threshold (>10%). Uses post-M12-audit weighted definition, not
  # the pre-fix binary share.
  thin_data_weighted_share_ceiling: 0.10

  # Top-N concentration ceilings. PRD v3 §C numeric thresholds.
  top1_weight_max_ceiling: 0.40
  top3_weight_max_ceiling: 0.70

  # Panel cutoff — HARD per unfreeze memo §G4.
  # CRITERIA-LEVEL TIGHTENING: while §G4 caps the maximum allowed
  # cutoff at 2024-12-31, this lineage tightens further to
  # 2023-12-31 so that the entire calendar year 2024 is reserved
  # as the pseudo-OOS robustness window (§G2.B). With cutoff at
  # 2024-12-31, "construct on 2024 + report robustness on 2024"
  # would be a pseudo-OOS-in-name-only artifact; tightening to
  # 2023-12-31 makes the 2024 holdout a genuine
  # information-isolated window.
  panel_cutoff_max_date: "2023-12-31"

  # Universe + panel + mask spec. Inherits the post-round-3 78-sym
  # universe (BRK-B dropped). NO universe extension allowed under
  # this unfreeze.
  universe_panel_mask_spec:
    seed_pool_source: config/universe.yaml::seed_pool
    sector_etfs_source: config/universe.yaml::sector_etfs
    factor_etfs_source: config/universe.yaml::factor_etfs
    cross_asset_source: config/universe.yaml::cross_asset
    blacklist_source: config/universe.yaml::blacklist
    macro_reference_source: config/universe.yaml::macro_reference
    drop_symbols: ["BRK-B"]   # round-3 step-3b drop
    n_symbols_expected: 78
    mask: research_mask_default
    mask_config: config/research_mask.yaml

  # Forecast horizon. Locked to 21d (used by RCMv1 + Cand-2 for
  # consistency in cross-candidate comparison).
  fwd_return_horizon_days: 21
  ic_evaluation_lag_bars: 1   # leakage-safe semantic per R15


# ── G2.B — REPORT-ONLY / INTERPRETIVE (must-report; do NOT gate) ────
# A candidate's S1 artifact set MUST include these fields. Their
# values do NOT singly gate promotion. Reviewers use them to form
# qualitative judgement on whether a hard-pass nominee should
# actually advance to the paper-slot queue.
#
# IMPORTANT: nothing in this section is a binary threshold. Tools
# downstream that read this file MUST NOT treat report_only fields
# as additional must-pass gates.
report_only:

  # Per-regime IR breakdown (6 PQS regimes). No per-regime
  # threshold; reviewer reads to assess whether the candidate is
  # regime-balanced or regime-fragile.
  regime_stability_per_regime_ir:
    must_report_regimes:
      - BULL
      - BEAR
      - RISK_ON
      - RISK_OFF
      - CRISIS
      - SIDEWAYS

  # Portfolio-weighted β statistics (from
  # core.research.concentration.compute's beta_map path).
  benchmark_beta_statistics:
    must_report:
      - portfolio_weighted_mean_beta
      - portfolio_weighted_std_beta
      - max_abs_per_symbol_beta
      - n_symbols_with_beta

  # Pseudo-OOS robustness summary on the 2024 calendar year —
  # held entirely OUTSIDE the construction window (since
  # panel_cutoff_max_date is 2023-12-31). This is the genuine
  # pseudo-OOS window for this lineage.
  #
  # Still pseudo-OOS, NOT real OOS, per PRD v3 §1.1+§1.3.
  # Numbers go in the report; they do not move the gate.
  pseudo_oos_robustness_window:
    window_start_target: "2024-01-01"
    window_end_target: "2024-12-31"
    must_report:
      - cum_ret
      - sharpe
      - max_dd
      - vs_spy
      - vs_qqq
      - turnover_daily_mean
      - fill_count

  # Turnover proxy (monthly). Reference: Cand-2 0.636; RCMv1 0.196.
  # Reported but not capped — high turnover may be acceptable
  # given cost model.
  turnover_proxy:
    must_report: true

  # Correlation vs existing pair. Diversification context.
  # Reported but not gated — high correlation might still be
  # valuable as a "different expression of the same thesis";
  # low correlation contributes to fleet diversity.
  correlation_vs_existing_pair:
    must_report:
      - composite_corr_vs_rcm_v1_defensive_composite_01
      - composite_corr_vs_candidate_2_orthogonal_01


# ── Mining configuration that this criteria authorizes ──────────────
# Captures HOW mining will be run under this lineage. Anti-cherry-
# pick: committed alongside the criteria so the mining run cannot
# secretly use a different config.
mining_config:
  sampler: tpe
  seed: 42
  n_trials: 200            # search-depth dial; deeper search +
                           # accept 0 nominee outcome better than
                           # shallow search forcing a nominee
  min_families: 3
  max_features_per_family: 2
  archive_db: data/mining/rcm_archive.db
  optuna_db: data/mining/rcm_optuna.db
  out_dir: data/ml/research_miner
  panel_start_date: "2007-01-02"
  panel_end_date: "2023-12-31"   # G4 hard cap, criteria-tightened



# NON-IMMUTABLE smoke yaml for PRD-AC v1.1 Phase 4 wiring verification.
# Runs 5 v2_nav_based trials to confirm runner / harness / NAV gate
# integration before kicking off the canonical cycle06 200-trial mining.
# This file is NOT a research-cycle nominee yaml; the immutable cycle06
# yaml is `track-c-cycle-2026-05-06-01_promotion_criteria.yaml`.

lineage_tag: track-c-cycle-2026-05-06-smoke
panel_max_date_at_freeze: 2024-12-31
freeze_date: 2026-05-06
factor_registry_pool: RESEARCH_FACTORS
data_source_canonical: post_rebuild_2026_05_01_canonical_plus_yfinance_backfill_2009_2014
end_date: 2025-12-31

drop_symbols:
  - BRK-B
  - USO
  - SLV

universe_extension:
  mode: stocks_plus_cross_asset
  stocks_count: 53
  cross_asset_count: 6

construction:
  mode: cap_aware_cross_asset
  rebalance_cadence: monthly
  top_n: 10
  cluster_cap: 0.20
  max_single_weight: 0.10
  asset_class_caps:
    equities_max: 0.70
    bonds_max: 0.40
    commodities_max: 0.20
    cash_anchor_max: 0.30

mining_config:
  sampler: tpe
  seed: 42
  n_trials: 20  # SMOKE — production cycle06 yaml has 200
  min_families: 3
  max_features_per_family: 2
  composite_cardinality: 3
  composite_weighting: equal_weight
  archive_db: data/mining/rcm_archive.db
  optuna_db: data/mining/rcm_optuna.db
  out_dir: data/ml/research_miner/track-c-cycle-2026-05-06-smoke
  panel_start_date: "2009-01-02"
  panel_end_date: "2025-12-31"
  temporal_split_role: core
  factor_registry_source: core/factors/factor_registry.py
  factor_registry_pool: RESEARCH_FACTORS
  explicit_exclusions:
    - intraday_autocorr_21d
    - intraday_vol_ratio_21d
    - realized_vol_60m_21d

  objective_version: v2_nav_based
  objective_weights:
    w_ir: 0.70
    w_turnover: 0.05
    w_corr_conc: 0.05
    w_bench_excess: 0.0
    w_regime_stddev: 0.0
    w_nav_sharpe: 0.15
    w_nav_max_dd_penalty: 0.05
    w_nav_orthogonality: 0.0
    w_vs_qqq_excess: 0.0
  holding_freq_choices: [monthly, weekly, daily]
  enable_sr_defer_choices: [false]

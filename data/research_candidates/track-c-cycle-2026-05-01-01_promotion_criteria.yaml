# Promotion Criteria — Track C Cycle 2026-05-01 #01 (cap-aware construction)
#
# Authority:
#   - docs/memos/20260426-research_layer_partial_unfreeze.md (research layer)
#   - docs/memos/20260430-track_c_cycle_2026-04-30-02_close.md (cycle #02
#     refuted C-1 horizon hypothesis; same factor template at 5d as 21d)
#   - docs/memos/20260430-track_c_cycle_2026-04-30-01_close.md (cycle #01
#     refuted naive global top-N at 21d)
#   - docs/memos/20260501-heterogeneous_split_fix_executed.md (canonical
#     data restored 2026-05-01; all 78/78 universe sym clean)
#   - docs/memos/20260501-cycle03_path_decision.md (axis decision: cap-aware
#     construction with risk_cluster + max_single caps)
#   - User explicit go (zibo, 2026-05-01, "根据你的经验选最优路径 然后开工")
#   - User cluster-design feedback 2026-05-01 ("GICS sector 太粗;
#     risk-cluster-aware construction"; operator chose single-layer 17
#     clusters per docs/memos/20260501-cycle03_path_decision.md)
#
# Lineage tag:    track-c-cycle-2026-05-01-01
# Authored:       2026-05-01
# Authored by:    Claude (operator) under user explicit-go
# Authoring axis: cap-aware construction = risk_cluster + max_single
#                 caps applied at top-N selection time.
#                 NOT factor-pool axis (cycle #01+#02 exhausted that).
#                 NOT C-1 horizon axis (cycle #02 refuted that).
#                 NOT naive C-3 beta cap (Step 0 found RCMv1 natural β
#                 already 0.14-0.31; β=0.75 cap won't bind).
#
# IMMUTABILITY CONTRACT:
#   Once this file is committed with sha256 recorded in commit message,
#   ALL fields below are FROZEN for this lineage. If any threshold turns
#   out wrong in hindsight, the next research cycle gets new criteria;
#   this lineage's bar does NOT move. (Cycle #02 yaml frozen at sha256
#   492a72b1...05c42c, untouched even when archived.)
#
# SHA256 verification:
#   sha256sum data/research_candidates/track-c-cycle-2026-05-01-01_promotion_criteria.yaml

lineage_tag: track-c-cycle-2026-05-01-01
panel_max_date_at_freeze: 2024-12-31  # train+val end
freeze_date: 2026-05-01
factor_registry_pool: RESEARCH_FACTORS  # full V2 64-factor pool
data_source_canonical: post_rebuild_2026_05_01_canonical  # commit be387d3
end_date: 2025-12-31  # G4 cutoff (validation 2025 visible to selector,
                       # not to miner; sealed 2026 NEVER read)

drop_symbols:
  - BRK-B  # round-3 step3b drop, no_1m_data; preserved across cycles


# ── Construction (NEW for cycle #03) ──────────────────────────────────
# Cap-aware selection. greedy by composite score → cluster_cap binding
# → max_single binding → up to top_n picks. Implicit cash when caps
# bind tightly.

construction:
  mode: cap_aware                  # core/research/harness/composite_evaluator.py
                                   # construction_mode='cap_aware'
  rebalance_cadence: monthly       # SAME as RCMv1 + Cand-2 + cycle #01
                                   # (NOT C-1 weekly — cycle #02 already
                                   # tested that, refuted)
  top_n: 10                        # target 10 picks (= RCMv1 + Cand-2)
  cluster_map_module: core.research.risk_cluster_map.STOCK_RISK_CLUSTER_MAP
  cluster_cap: 0.20                # max 20% portfolio per risk_cluster
                                   # (= max 2 picks per cluster at top_n=10)
  max_single_weight: 0.10          # max 10% portfolio per single name
                                   # (= 1/top_n exactly; binding bound)
  min_holding_days: 1
  long_only: true                  # invariant
  no_short: true                   # invariant
  no_margin: true                  # invariant


# ── Mining (UNCHANGED from cycle #02) ─────────────────────────────────
# Mining objective is rank-based composite IC + IR + benchmark + corr_
# concentration. Construction (cap_aware) is at EVAL time; mining is
# the same global-IC objective as cycle #01+#02. The point of cycle
# #03 is to test whether the SAME mined factors paired with cap-aware
# CONSTRUCTION break the sibling-collapse pattern.

mining_config:
  trials: 200
  seed: 42
  sampler: tpe
  composite_weighting: equal_weight  # uniform 1/n; cardinality 3
  composite_cardinality: 3
  factor_registry_pool: RESEARCH_FACTORS
  explicit_exclusions:
    - intraday_autocorr_21d
    - intraday_vol_ratio_21d
    - realized_vol_60m_21d


# ── Hard requirements (Track A acceptance gates) ──────────────────────

hard_requirements:
  composite_ic_ir_full_period_min: 0.30
  walk_forward_ic_ir_min_per_fold: 0.0
  composite_cardinality: 3
  fwd_return_horizon_days: 21      # SAME as cycle #01 (NOT 5d) — single-
                                   # variable contrast vs cycle #01
                                   # (cycle #01 = 21d global top-N;
                                   #  cycle #03 = 21d cap_aware; diff =
                                   #  +cap_aware only)
  ic_evaluation_lag_bars: 1


# ── Hard blockers (acceptance-independent) ──────────────────────────

hard_blockers:
  - any_validation_year_maxdd_above_0_20
  - any_stress_slice_maxdd_above_0_25
  - validation_aggregate_excess_vs_qqq_le_0
  - validation_2025_role_hard_gate_failure


# ── Anti-sibling discipline (cycle #03 specific) ─────────────────────
# Sibling-by-construction is the failure mode this cycle is engineered
# to break. Define what counts as "still sibling":

anti_sibling_discipline:
  factor_overlap_threshold: 2          # if shares ≥ 2 factors with cycle
                                       # #01 / #02 top-1 → sibling-by-
                                       # factor (since composite_cardinality=3)
  realized_nav_correlation_pooled_max: 0.85   # vs RCMv1+Cand-2 (Step 5
                                              # reject threshold)
  realized_nav_correlation_residual_max: 0.70 # vs RCMv1+Cand-2 after
                                              # stripping SPY+QQQ beta
  classification_thresholds:
    pooled_lt_0_50:    true_diversifier      # both raw and residual
    pooled_0_50_0_70:  partial_diversifier
    pooled_0_70_0_85:  warn_label_void
    pooled_gte_0_85:   reject_step5


# ── Report-only / interpretive ──────────────────────────────────────

report_only:

  regime_stability_per_regime_ir:
    must_report_regimes:
      - BULL
      - BEAR
      - RISK_ON
      - RISK_OFF
      - CRISIS
      - SIDEWAYS

  benchmark_beta_statistics:
    must_report:
      - portfolio_weighted_mean_beta
      - portfolio_weighted_std_beta
      - max_abs_per_symbol_beta
      - n_symbols_with_beta

  stress_slice_diagnostics:
    must_report_per_slice:
      - covid_flash      # 2020-02-15 → 2020-04-30
      - rate_hike_2022   # 2022-08-15 → 2022-10-15
    fields:
      - cum_ret
      - sharpe
      - max_dd
      - vs_spy
      - vs_qqq

  turnover_proxy:
    must_report: true

  # Cycle #03 specific: cluster diversity census
  cluster_diversity:
    must_report:
      - n_unique_clusters_per_rebalance_avg     # avg clusters per rebal day
      - cluster_concentration_max               # max single cluster %
      - n_picks_avg                             # avg #picks (≤ top_n)
      - implicit_cash_pct_avg                   # 1 - sum(weights), avg
      - top_3_clusters_by_average_weight

  # Cross-cycle NAV correlation
  composite_nav_correlation_vs_existing_pair:
    must_report:
      - rcm_v1_pooled_pearson_raw
      - rcm_v1_pooled_pearson_residual_vs_spy
      - rcm_v1_pooled_pearson_residual_vs_qqq
      - cand_2_pooled_pearson_raw
      - cand_2_pooled_pearson_residual_vs_spy
      - cand_2_pooled_pearson_residual_vs_qqq

  human_path_knowledge_inventory:
    today_date: "2026-05-01"
    declared_2026_observations:
      - "Cycle #01 (21d global top-N) closed Tier-2 sibling
         {beta_spy_60d, mom_12_1, volume_ratio_20d}. IC_IR=0.6562 on
         pre-rebuild data; not numerically reproducible post-rebuild
         but factor identity stable."
      - "Cycle #02 (5d weekly C-1) closed Tier-2 sibling, same top-1
         composite as cycle #01 (3-of-3 factor identical), IC_IR=
         1.0592 on pre-rebuild corrupted data. C-1 horizon hypothesis
         fully refuted."
      - "Heterogeneous split-adjustment in 13/78 universe sym fixed
         2026-05-01 via canonical 1m → daily rebuild (commit be387d3).
         All 78/78 sym now scan-clean. n_obs panel size dropped
         3021 → 1511 due to canonical N_min=300 enforcement."
      - "Step 0 RCMv1 retro β: 0.143-0.314 across 2022-2024 cells.
         Confirms naive C-3 cap β=0.75 won't bind (won't change
         selection)."
      - "Cycle #03 (this) tests cap-aware construction at 21d horizon.
         Single-variable diff vs cycle #01 = +cap_aware (cluster_cap
         + max_single)."



# Frozen strategy spec for rcm_v1_defensive_composite_01.
#
# Extracted from docs/20260424-rcm_v1_s1_candidate_memo.md §2 on 2026-04-24
# during Phase E-0 R3 migration. Stops being a narrative memo field and
# becomes the canonical spec file.
#
# DO NOT MODIFY any field after freeze without a new candidate_id.
# To change this spec: freeze a new candidate_id from rcm_archive,
# revoke the old one with revoke_reason=candidate_superseded.

candidate_id: rcm_v1_defensive_composite_01
strategy_version: rcm-v1-2026-04-24
strategy_type: single_factor_composite
family: research_composite        # NOT in PRODUCTION_FACTORS

# R4 (Phase E-1) — decision memo path (mandatory field per PRD §E1-R4).
# The registry row also records this under decision_memo_path; frozen
# YAML duplicates it so a frozen spec is self-contained from a reader's
# point of view.
decision_memo: docs/20260424-rcm_v1_s1_candidate_memo.md

# R4 — summary fields required by FrozenStrategySpec. Structured here
# (not just memo references) so promote_standard gates can machine-check.
benchmark_relative_summary:
  note: >-
    Composite IC is cross-sectional rank correlation (Spearman) and thus
    approximately benchmark-neutral by construction. Full benchmark-
    relative portfolio P&L defer to paper layer. Convergence evidence:
    +1.59 IR in CRISIS regime (defensive tilt works when needed), +0.17
    IR in RISK_ON (weakest — pure beta-on underperforms low-beta tilt).
  crisis_regime_ic_ir: 1.589
  risk_on_regime_ic_ir: 0.167
  vs_spy_qqq: deferred_to_paper_layer

# ── Realized-NAV correlation symmetry note (added 2026-04-30) ──────────────
# The 2026-04-30 NAV-correlation diagnostic measures pooled Pearson 0.898
# between RCMv1 and candidate_2_orthogonal_01 over 154 honest post-step3b
# paper days (exceeds Step 5 reject threshold 0.85). This is a property of
# the PAIR, not of either spec individually — RCMv1 remains a valid single
# strategy. The marker below makes the symmetric labeling explicit so the
# fleet-of-two composition cannot be re-instated without a new evidence
# memo overriding this finding. Mirrors the same block on Cand-2's yaml.
realized_nav_correlation_status:
  status: nav_correlated_with_cand_2
  scope: realized_paper_nav
  pooled_pearson: 0.898
  pooled_n_days: 154
  step5_label: reject
  evidence_memo: docs/memos/20260430-rcmv1_cand2_realized_correlation.md
  retracted_claim: >-
    Fleet-of-two composition (RCMv1 + Cand-2 equal-weight) — does NOT
    produce risk diversification. Both candidates run β-SPY 1.3-1.6;
    neither is realized-defensive. Forward observation continues as
    legacy decay verification only. RCMv1 as a single strategy is
    unaffected by this finding.
  retraction_date: 2026-04-30

# ── Candidate lifecycle classification (added 2026-04-30, R35 cleanup) ────
# Machine-readable lifecycle state. Distinct from
# `realized_nav_correlation_status` above (which describes a PAIR-FINDING).
# B.MV runner dispatches on `decay_classification.label`:
#   if label == "legacy_decay_verification":
#       return (False, [])   # skip B.MV entirely
# See docs/memos/20260430-bmv_schema_decision.md for canonical contract.
decay_classification:
  label: legacy_decay_verification
  reason: nav_correlated_with_cand_2_pre_g2a_concentration_ceiling_pre_m12_weighted_thin
  evidence_memo: docs/memos/20260430-rcmv1_cand2_realized_correlation.md
  set_at: 2026-04-30
  set_by: post_realized_nav_correlation_finding

# ── Estimated β at freeze (added 2026-04-30, R35 cleanup) ─────────────────
# Canonical schema (per docs/memos/20260430-bmv_schema_decision.md).
# B.MV trigger T4 reads `estimated_beta_at_freeze.beta_to_spy`. For NEW
# candidates Track A acceptance auto-stamps these fields at freeze with
# `source=track_a_acceptance` and `used_by_b_mv=true`. For LEGACY this
# block is SPEC-COMPLETENESS ONLY — `used_by_b_mv: false` and B.MV
# short-circuits at `decay_classification.label` BEFORE reaching T4.
# Backfilled values from paper sample, NOT from train+validation, so
# their semantics differ from new-candidate stamps; that's why
# `source` and `window` fields exist.
estimated_beta_at_freeze:
  beta_to_spy: 1.41
  beta_to_qqq: 1.13
  method: cov_ret_d_div_var_bench_ret_d
  window: pooled_post_step3b_paper_154d
  n_obs: 154
  source: pooled_paper_sample_post_step3b
  computed_at: 2026-04-30
  computed_by: dev/scripts/correlation/rcmv1_cand2_realized_nav_correlation.py
  used_by_b_mv: false
  reason_unused: "decay_classification.label=legacy_decay_verification; B.MV skips legacy at dispatch"

oos_holdout_summary:
  walk_forward_n_folds: 4
  walk_forward_folds_positive: 4
  walk_forward_weakest_ir: 0.181       # fold 2 incl. 2018 + COVID stress
  walk_forward_strongest_ir: 0.777     # fold 4 recency
  full_period_ic_ir: 0.4951
  full_period_n_dates: 3310

robustness_summary:
  weight_sensitivity_n_experiments: 14
  weight_sensitivity_ir_range: [0.383, 0.510]
  weight_sensitivity_ir_std: 0.032
  dominant_feature: drawup_from_252d_low   # dropping -> -0.11 IR
  alternative_equal_weight_ir: 0.510       # marginal +3% vs TPE-tuned
  random_baseline_best_ir: 0.336           # TPE beats random by 56%
  cost_turnover_proxy: 0.196               # monthly-ish
  corr_concentration: 0.037                # very low redundancy

feature_set:
  - name: beta_spy_60d
    family: A                     # Benchmark-relative / Residual / Risk Exposure
    weight: 0.186
    source: core/factors/factor_generator.py::_family_a_benchmark_relative
  - name: drawup_from_252d_low
    family: B                     # Position / Breakout / Path Shape
    weight: 0.302
    source: core/factors/factor_generator.py::_macro_regime_factors
  - name: days_since_52w_high
    family: B
    weight: 0.395
    source: core/factors/factor_generator.py::_family_b_position_breakout
  - name: amihud_20d
    family: C                     # Liquidity / Cost Proxy / Risk State
    weight: 0.116
    source: core/factors/factor_generator.py::_family_c_liquidity_risk

transforms:
  standardization: zscore_cross_sectional
  min_periods: 5
  implementation: core/mining/research_miner.py::zscore_cs

composite_rule:
  method: weighted_sum
  formula: "sum(weight[i] * zscore_cs(feature[i])) for i in feature_set"
  implementation: core/mining/research_miner.py::build_composite_series

labels:
  fwd_return_horizon_days: 21
  fwd_return_mode: cc
  ic_evaluation_lag_bars: 1       # R15 leakage-safe semantic

panel_contract:
  universe: "config/universe.yaml::seed_pool + sector_etfs + factor_etfs + cross_asset"
  n_tradable_at_proposal: 79
  start_date: 2007-01-02
  benchmark_map:
    SPY: close_series
    QQQ: close_series
  mask:
    type: research_mask
    min_price: 5.0
    min_usd_volume: 20000000
    rolling_window_days: 20
    implementation: core/factors/base_masks.py::research_mask

rebalance:
  frequency: monthly              # implied by 21d horizon; exact schedule TBD at paper layer
  schedule: TBD

weighting_rule: TBD               # paper layer to map composite signal to portfolio weights

benchmark_definition:
  primary: SPY
  secondary: QQQ

risk_overlay:
  inherits_from: config/risk.yaml
  composite_specific:
    max_single_symbol_weight: 0.35
    max_top_3_weight: 0.70

cost_model_version: config/cost_model.yaml

alternative_weighting_variant:
  description: >-
    Equal-weight variant. R19 sensitivity showed +0.510 IR vs TPE-tuned
    +0.495 (3% edge within noise). Retained as fallback if TPE-tuned
    weights appear overfit.
  feature_weights:
    beta_spy_60d: 0.25
    drawup_from_252d_low: 0.25
    days_since_52w_high: 0.25
    amihud_20d: 0.25

# Source trial reference
source:
  trial_id: f24aefecc91a
  lineage_tag: post-2026-04-24-rcm-v1-lag1
  archive_db: data/mining/rcm_archive.db
  study: rcm-v1-run-02-lag1
  sampler: TPESampler
  seed: 42
  n_trials_in_study: 200

# Research evidence summary (from memo §3; full detail in acceptance artifact)
research_evidence:
  full_period:
    ic_mean: 0.0372
    ic_std: 0.0751
    ic_ir: 0.4951
    positive_rate: 0.567
    n_dates: 3310
    turnover_proxy: 0.196
    corr_concentration: 0.037
  walk_forward_n_folds: 4
  walk_forward_folds_positive: 4

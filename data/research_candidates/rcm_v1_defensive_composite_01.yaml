  regime_strongest: CRISIS        # IR=+1.589
  regime_weakest: RISK_ON         # IR=+0.167
  weight_sensitivity_ir_range: [0.383, 0.510]
  weight_sensitivity_ir_std: 0.032
  random_baseline_best_ir: 0.336  # vs TPE 0.524 (56% higher)
  acceptance_decision: promote_to_paper

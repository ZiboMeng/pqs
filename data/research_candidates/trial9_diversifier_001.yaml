# (Required by core/research/frozen_spec.py validation; cannot be empty)

benchmark_relative_summary:
  full_period_vs_spy: 2.7070       # +270.7% (passes hard >0)
  full_period_vs_qqq: 0.0626       # +6.3% (passes hard >0)
  holdout_2025_vs_qqq: 0.0959      # +9.6% (passes 2025 strict >0)
  oos_window_mean_vs_qqq: -0.0459  # -4.6% (WAIVED per diversifier role)
  note: >-
    Diversifier role: window-mean rule waived per CLAUDE.md QQQ Rule
    diversifier exception (PRD §6.2). Full-period + holdout strict
    pass. Stress-slice vs_qqq: covid_flash +26.1%, rate_hike_2022 +9.6%
    (both meaningfully positive in stress).

oos_holdout_summary:
  walk_forward_n_folds: 5
  walk_forward_folds_positive: 2     # 2018 + 2025 positive vs_qqq
  walk_forward_weakest_window: 2023  # vs_qqq -19.75%
  walk_forward_strongest_window: 2025  # vs_qqq +9.59%
  walk_forward_window_mean_vs_qqq: -0.0459
  full_period_vs_qqq: 0.0626
  full_period_n_dates: 4876
  holdout_2025_vs_qqq: 0.0959
  holdout_2025_max_dd: -0.1816
  note: >-
    Walk-forward window-mean is negative because 2019/2021/2023 were
    BULL years that QQQ tech-led; trial 9 underperformed QQQ in those
    windows but provided drawdown protection. 2018 (BEAR) and 2025
    (RISK_OFF/CRISIS) windows positive — diversifier value visible in
    non-bull regimes.

robustness_summary:
  weight_sensitivity: not_yet_evaluated_phase_c_prd_1
  dominant_feature: max_dd_126d         # Family B substitute for drawup
  alternative_weighting: equal_weight_only_currently
  cost_2x_stress_status: deferred_to_b_mv_track_a_extension
  cost_turnover_proxy: 0.5218           # higher than RCMv1 (0.196)
  corr_concentration: 0.1400            # 3.8x RCMv1 (0.037)
  note: >-
    Phase C-PRD-1 robustness summary is partial — no weight-sensitivity
    sweep, no random-baseline comparison, no cost-2x stress run yet.
    Trial 9 enters forward observation as diversifier candidate; full
    robustness sweep deferred to Phase C-PRD-2 sleeve abstraction work
    when Trial 9 also gets Track A acceptance β-stamp.


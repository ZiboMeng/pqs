drop_symbols:
  - BRK-B
  - USO
  - SLV


# ── Universe (cycle04/06/07a/08 inherited verbatim) ─────────────────────

universe_extension:
  mode: stocks_plus_cross_asset
  stocks_count: 53
  cross_asset_count: 6
  total_eligible: 59
  cluster_count_total: 22
  cross_asset_cluster_map_module: core.research.risk_cluster_map.CROSS_ASSET_RISK_CLUSTER_MAP
  unified_cluster_map_helper: core.research.risk_cluster_map.make_unified_cluster_map
  asset_class_map_module: core.research.risk_cluster_map.ASSET_CLASS_BY_CLUSTER


# ── Construction (cycle08 inherited verbatim) ────────────────

construction:
  mode: cap_aware_cross_asset
  rebalance_cadence: monthly
  top_n: 10
  cluster_cap: 0.20
  max_single_weight: 0.10
  min_holding_days: 1
  long_only: true
  no_short: true
  no_margin: true
  asset_class_caps:
    equities_max:    0.70
    bonds_max:       0.40
    commodities_max: 0.20
    cash_anchor_max: 0.30


# ── Mining: v3_regime_conditional + family_first sampling ─────────

mining_config:
  sampler: tpe
  seed: 42
  n_trials: 200
  sampling_mode: family_first  # cycle10 A++ ship; required for high-family-count pool
  min_families: 3
  max_features_per_family: 2
  fwd_return_horizon_days: 21
  fwd_return_mode: cc
  composite_lag_bars: 1
  factor_registry_pool: RESEARCH_FACTORS
  objective_version: v2_nav_based  # cycle10 ship default
  holding_freq_sample: [monthly, weekly]
  explicit_exclusions:
    - intraday_autocorr_21d
    - intraday_vol_ratio_21d
    - realized_vol_60m_21d


# ── Anti-sibling (D1 finding-driven) ──────────────────────────────

anti_sibling_thresholds:
  raw_nav_pearson_reject_threshold: 0.85
  residual_nav_pearson_reject_threshold: 0.50
  factor_overlap_with_active_core_max: 2
  # D1 fleet pair anchor: must be non-sibling vs BOTH cycle08 candidates
  fleet_anchor_candidates:
    - {trial_id: 8ac6bccbeed1, lineage: track-c-cycle-2026-05-08-01,
       features: [max_dd_126d, mom_252d, reversal_21d], cadence: weekly}
    - {trial_id: 3f40e3f4ed1a, lineage: track-c-cycle-2026-05-08-01,
       features: [max_dd_126d, xsection_rank_63d, ret_5d], cadence: monthly}



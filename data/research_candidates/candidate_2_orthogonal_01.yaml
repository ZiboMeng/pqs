# ── Non-stub summaries (authored 2026-04-24, Phase E-post R6) ───────────────

benchmark_relative_summary:
  note: >-
    Composite is cross-sectional zscore-then-weighted-sum, so it is
    approximately benchmark-neutral by construction. Per PRD §5.3 A
    Candidate-2 is oriented to benchmark-relative / residual-strength
    / risk-adjusted-continuation economics, orthogonal to RCMv1's
    defensive/regime/liquidity family.
  composite_corr_vs_rcm_v1: 0.404
  composite_corr_vs_rcm_v1_threshold: 0.5
  composite_corr_vs_rcm_v1_pass: true
  turnover_relative_diff_pct: 79.2
  turnover_relative_diff_threshold_pct: 20.0
  turnover_relative_diff_pass: true
  vs_spy_qqq: deferred_to_paper_layer
  evidence_artifact: data/research_candidates/candidate_2_probe_report.json

oos_holdout_summary:
  note: >-
    IC probe on post-2026-04-24-rcm-v1-lag1 lineage window (>= 2015-01)
    with lag=1 bar and fwd=21d horizon. Each factor passes Spearman IC
    p < 0.05 gate. Combined composite's full-period IR ~0.116 is
    expected to be lower than single-factor IRs because equal weights
    are sub-optimal relative to IC-maximizing weights (by design — PRD
    §5.5 mandates equal weighting to prevent implicit mining).
  evaluation_window_start: 2015-01-01
  evaluation_lag_bars: 1
  fwd_return_horizon_days: 21
  per_factor_ic_mean:
    ret_5d: 0.0335
    rs_vs_spy_126d: 0.0302
    hl_range: 0.0372
  per_factor_ic_ir:
    ret_5d: 0.107
    rs_vs_spy_126d: 0.104
    hl_range: 0.136
  per_factor_p_value:
    ret_5d: 0.0
    rs_vs_spy_126d: 0.0
    hl_range: 0.0
  full_period_ic_mean: 0.0336
  full_period_ic_ir: 0.1159
  n_dates: 3255
  walk_forward_status: deferred_to_acceptance_artifact

robustness_summary:
  note: >-
    Regime positivity check on lightweight SPY-derived 6-regime labels.
    Each factor must show positive IC in >= 3 of 6 regimes. This is a
    fast pre-check; full canonical regime stability is re-verified by
    acceptance_research_composite.py on demand. Fixed equal weights
    sidestep weight-sensitivity — there are no weights to tune.
  per_factor_positive_regimes:
    ret_5d: 3
    rs_vs_spy_126d: 4
    hl_range: 5
  regime_n_total: 6
  weight_sensitivity_status: not_applicable_by_construction
  cost_turnover_proxy: 0.636
  corr_concentration: 0.10

decision_memo: docs/20260424-candidate_2_decision_memo.md
strategy_type: single_factor_composite
family: research_composite

transforms:
  standardization: zscore_cross_sectional
  min_periods: 5
  implementation: core/mining/research_miner.py::zscore_cs

composite_rule:
  method: weighted_sum
  formula: "sum(weight[i] * zscore_cs(feature[i])) for i in feature_set"
  implementation: core/mining/research_miner.py::build_composite_series

labels:
  fwd_return_horizon_days: 21
  fwd_return_mode: cc
  ic_evaluation_lag_bars: 1       # R15 leakage-safe semantic

panel_contract:
  universe: "config/universe.yaml::seed_pool + sector_etfs + factor_etfs + cross_asset"
  n_tradable_at_proposal: 79
  start_date: 2015-01-01
  benchmark_map:
    SPY: close_series
    QQQ: close_series
  mask:
    type: research_mask
    min_price: 5.0
    min_usd_volume: 20000000
    rolling_window_days: 20
    implementation: core/factors/base_masks.py::research_mask_default
    config_source: config/research_mask.yaml

rebalance:
  frequency: monthly
  schedule: TBD

weighting_rule: TBD
benchmark_definition:
  primary: SPY
  secondary: QQQ

risk_overlay:
  inherits_from: config/risk.yaml
  composite_specific:
    max_single_symbol_weight: 0.35
    max_top_3_weight: 0.70

cost_model_version: config/cost_model.yaml

source:
  trial_id: cand2_equal_03
  lineage_tag: phase-e-post-2026-04-24-cand2
  study_id: candidate-2-construction-2026-04-24
  archive_db: data/mining/rcm_archive.db
  construction_method: hand_selected_equal_weight
  family_counts:
    B_momentum_path: 1
    A_benchmark_relative: 1
    C_liquidity_risk: 1

notes: >-
  Candidate-2 constructed 2026-04-24 per docs/20260424-prd_phase_e_post_cand2.md
  §5-6. Hard constraint: 3 factors, equally weighted (1/3 each), NO TPE /
  Optuna / grid search. Initial PRD §5.5 suggestions {residual_mom_spy_20d,
  return_per_risk_21d, trend_tstat_20d} rejected (all negative IC at 21d fwd
  on this universe — see candidate_2_probe_initial_reject.json). Pivoted to
  {ret_5d, rs_vs_spy_126d, hl_range} — all pass IC p<0.05, regime positivity,
  and orthogonality vs RCMv1 (corr 0.40 < 0.5, turnover diff 79% >= 20%).

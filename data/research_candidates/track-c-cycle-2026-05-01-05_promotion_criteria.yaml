      - rcm_v1_pooled_pearson_residual_vs_spy
      - rcm_v1_pooled_pearson_residual_vs_qqq
      - cand_2_pooled_pearson_raw
      - cand_2_pooled_pearson_residual_vs_spy
      - cand_2_pooled_pearson_residual_vs_qqq
      - cycle_03_top_pooled_pearson_raw
      - cycle_03_top_pooled_pearson_residual_vs_spy
      - cycle_03_top_pooled_pearson_residual_vs_qqq
      - cycle_01_top_pooled_pearson_raw
      - cycle_02_top_pooled_pearson_raw

  human_path_knowledge_inventory:
    today_date: "2026-05-01"
    declared_2026_observations:

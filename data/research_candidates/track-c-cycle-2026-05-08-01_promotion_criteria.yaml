# Authoring axis: regime-conditional v3 mining objective + SR defer
#                 enabled (cycle07a + R4+R6 building blocks landed).
#                 Single-axis differential vs cycle07a:
#                   (i)  objective_version v2_nav_based -> v3_regime_conditional
#                   (ii) objective_weights → ObjectiveWeightsV3 fields
#                        (per-regime IR + BEAR-aggregate NAV-Sharpe +
#                        full-period anchor + vs_qqq)
#                   (iii) enable_sr_defer_choices [false] -> [false, true]
#                        (R4 shipped 60m-bar loading + filter integration)

lineage_tag: track-c-cycle-2026-05-08-01
panel_max_date_at_freeze: 2024-12-31
freeze_date: 2026-05-08
factor_registry_pool: RESEARCH_FACTORS
data_source_canonical: post_rebuild_2026_05_01_canonical_plus_yfinance_backfill_2009_2014
end_date: 2025-12-31

drop_symbols:
  - BRK-B
  - USO
  - SLV


# ── Universe (cycle04/06/07a inherited verbatim) ─────────────────────

universe_extension:
  mode: stocks_plus_cross_asset
  stocks_count: 53
  cross_asset_count: 6
  total_eligible: 59
  cluster_count_total: 22
  cross_asset_cluster_map_module: core.research.risk_cluster_map.CROSS_ASSET_RISK_CLUSTER_MAP
  unified_cluster_map_helper: core.research.risk_cluster_map.make_unified_cluster_map
  asset_class_map_module: core.research.risk_cluster_map.ASSET_CLASS_BY_CLUSTER


# ── Construction (cycle04/06/07a inherited verbatim) ────────────────

construction:
  mode: cap_aware_cross_asset
  rebalance_cadence: monthly
  top_n: 10
  cluster_cap: 0.20
  max_single_weight: 0.10
  min_holding_days: 1
  long_only: true
  no_short: true
  no_margin: true
  asset_class_caps:
    equities_max:    0.70
    bonds_max:       0.40
    commodities_max: 0.20
    cash_anchor_max: 0.30


# ── Mining: v3_regime_conditional + SR defer enabled ─────────────────

mining_config:
  sampler: tpe
  seed: 42
  n_trials: 200
  min_families: 3
  max_features_per_family: 2
  composite_cardinality: 3
  composite_weighting: equal_weight
  archive_db: data/mining/rcm_archive.db
  optuna_db: data/mining/rcm_optuna.db
  out_dir: data/ml/research_miner/track-c-cycle-2026-05-08-01
  panel_start_date: "2009-01-02"
  panel_end_date: "2025-12-31"
  temporal_split_role: core
  factor_registry_source: core/factors/factor_registry.py
  factor_registry_pool: RESEARCH_FACTORS
  explicit_exclusions:
    - intraday_autocorr_21d
    - intraday_vol_ratio_21d
    - realized_vol_60m_21d

  # Master PRD §4.3 C.1 + R6 (commit 6f115ae): regime-conditional v3.
  objective_version: v3_regime_conditional
  objective_weights_v3:
    # Per-regime IR weights (favor BEAR-conditional alpha)
    w_ir_BULL:     0.5
    w_ir_RISK_ON:  0.5
    w_ir_NEUTRAL:  0.5
    w_ir_CAUTIOUS: 1.0
    w_ir_RISK_OFF: 1.5
    w_ir_CRISIS:   2.0
    # Per-regime NAV-Sharpe weights
    w_nav_sharpe_BULL: 0.10
    w_nav_sharpe_BEAR: 0.30
    # Full-period (NOT regime-stratified)
    w_nav_orthogonality: 2.0
    w_vs_qqq_excess:     0.20

  # Master PRD §4.2 Phase B.2 R4 (commit 7512bae): SR defer enabled.
  holding_freq_choices: [monthly, weekly, daily]
  enable_sr_defer_choices: [false, true]   # R4 ship enables true branch


# ── Hard requirements ─────────────────────────────────────────────────

hard_requirements:
  composite_ic_ir_full_period_min: 0.30
  walk_forward_ic_ir_min_per_fold: 0.0
  composite_cardinality: 3
  fwd_return_horizon_days: 21
  ic_evaluation_lag_bars: 1


# ── Hard blockers ─────────────────────────────────────────────────────

hard_blockers:
  - any_validation_year_maxdd_above_0_20
  - any_stress_slice_maxdd_above_0_25
  - validation_aggregate_excess_vs_qqq_le_0
  - validation_2025_role_hard_gate_failure


# ── R41 informational dynamic anchor pool (Issue L) ──────────────────

r41_informational:
  apply_anchors:
    - rcm_v1_defensive_composite_01
    - candidate_2_orthogonal_01
    - trial9_diversifier_001                  # Issue L extension
  # cycle07a 0 nominee → NO cycle07a-nominee in pool
  classification_thresholds:
    pooled_raw_pearson_lt_0_50:    true_diversifier
    pooled_raw_pearson_0_50_0_70:  partial_diversifier
    pooled_raw_pearson_0_70_0_85:  warn_label_void
    pooled_raw_pearson_gte_0_85:   reject_step5


# ── G3 orthogonality gate (master PRD §4.3 C.3) ───────────────────────

g3_orthogonality_gate:
  enabled: true
  blend_anchors: [rcm_v1_defensive_composite_01, candidate_2_orthogonal_01, trial9_diversifier_001]
  raw_threshold: 0.70
  residual_threshold: 0.50
  n_floor: 30  # Issue H: SKIP if joint TDs < 30
  required_top_k_under_threshold: 1


# ── Fallback per Issue D (R6 ship) ───────────────────────────────────

regime_ic_fallback:
  enabled: true
  fallback_min_n_days: 200


# ── Smoke abort (cycle07a override per Issue I) ──────────────────────

smoke_abort_clause:
  enabled: true
  smoke_n_trials: 16
  decision_metric: any_v3_regime_conditional_trial_archived_ok_with_finite_objective
  thresholds:
    abort_if_zero_finite_objective_in_16_trials: true


# ── Hypothesis pre-registration (master PRD §5.1 + §4.3) ─────────────

hypotheses:
  G2_BEAR_IC_over_1_5x_BULL_IC: |
    Master PRD §5.2 G2: ≥1 spec in cycle08 top-10 with BEAR-IC > 1.5×
    BULL-IC. Tests whether v3 regime-conditional objective produces
    measurable regime-differential alpha (not just cross-regime
    averaging).

  G3_orthogonality_at_least_one_under_0_70: |
    Master PRD §4.3 C.3: ≥1 cycle08 top-3 trial with raw NAV cor < 0.70
    AND residual cor (vs SPY) < 0.50 vs (RCMv1+Cand-2+Trial9) blend.
    G3 SKIP if joint TDs < 30 per Issue H.

  H_track_a_at_least_one_pass: |
    Track A acceptance on top-3: at least 1 PASS (per-validation-year
    vs SPY ≥ 4/5; per-year MaxDD ≤ 20%; 2025 hard gate; stress slices
    ≤ 25%; concentration; beta to QQQ ≤ 0.85).


